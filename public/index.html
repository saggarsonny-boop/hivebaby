<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Hive — Free tools for everyone</title>
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="apple-touch-icon" href="/icon-192.png">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #060a14;
  font-family: system-ui, -apple-system, sans-serif;
  color: #e8f4ff;
  overflow: hidden;
  height: 100vh;
}

/* Canvas: fixed full-viewport, always behind everything */
#c {
  position: fixed;
  top: 0; left: 0;
  width: 100vw;
  height: 100vh;
  z-index: 0;
  touch-action: none;
  cursor: grab;
  display: block;
}
#c:active { cursor: grabbing; }

/* Planet UI: fixed overlay */
#planet-ui {
  position: fixed;
  top: 0; left: 0;
  width: 100%;
  height: 100vh;
  z-index: 10;
  pointer-events: none;
}
#planet-ui > * { pointer-events: auto; }

#search-wrap {
  position: absolute;
  top: 24px;
  left: 50%;
  transform: translateX(-50%);
  width: min(440px, calc(100vw - 40px));
}
#search {
  width: 100%;
  background: rgba(4, 8, 18, 0.88);
  border: 1px solid rgba(74, 127, 165, 0.35);
  border-radius: 28px;
  padding: 13px 22px;
  color: #e8f4ff;
  font-size: 15px;
  outline: none;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  transition: border-color 0.2s, box-shadow 0.2s;
  caret-color: #4a9fe0;
}
#search::placeholder { color: rgba(74, 127, 165, 0.5); }
#search:focus {
  border-color: rgba(74, 127, 165, 0.7);
  box-shadow: 0 0 0 3px rgba(74, 127, 165, 0.1);
}
#results { margin-top: 6px; display: flex; flex-direction: column; gap: 4px; }
.result-item {
  background: rgba(4, 8, 18, 0.92);
  border: 1px solid rgba(74, 127, 165, 0.25);
  border-radius: 14px;
  padding: 11px 16px;
  cursor: pointer;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  display: flex;
  align-items: center;
  gap: 12px;
  transition: border-color 0.15s;
}
.result-item:hover { border-color: rgba(212, 175, 55, 0.5); }
.result-item.soon { opacity: 0.6; cursor: default; }
.result-name  { font-size: 14px; font-weight: 700; color: #e8f4ff; }
.result-tagline { font-size: 12px; color: #4a7fa5; margin-top: 2px; }

/* Tooltip: fixed, above everything */
#tooltip {
  position: fixed;
  pointer-events: none;
  z-index: 20;
  display: none;
  background: rgba(4, 8, 18, 0.94);
  border: 1px solid rgba(212, 175, 55, 0.4);
  border-radius: 14px;
  padding: 13px 17px;
  min-width: 160px; max-width: 230px;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
}
#tooltip.soon-tt { border-color: rgba(74, 127, 165, 0.3); }
#tooltip .tt-name    { font-size: 14px; font-weight: 700; color: #e8f4ff; }
#tooltip .tt-tagline { font-size: 12px; color: #4a7fa5; margin-top: 5px; line-height: 1.5; }
#tooltip .tt-code    { font-size: 11px; color: rgba(74,127,165,0.4); font-family: monospace; margin-top: 4px; letter-spacing:.1em; }
#tooltip .tt-action  { font-size: 11px; color: rgba(212,175,55,.65); margin-top: 8px; }
#tooltip .tt-action.soon-action { color: rgba(74,127,165,.5); }

/* Footer: one-line, fixed bottom */
#footer {
  position: fixed;
  bottom: 22px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  pointer-events: none;
  white-space: nowrap;
  font-size: 12px;
  color: rgba(180, 200, 225, 0.45);
  letter-spacing: 0.02em;
}
#footer span { pointer-events: none; }
#footer a, #footer button {
  color: rgba(180, 200, 225, 0.45);
  text-decoration: none;
  background: none;
  border: none;
  font-size: 12px;
  font-family: inherit;
  cursor: pointer;
  padding: 0;
  pointer-events: auto;
  transition: color 0.2s;
}
#footer a:hover, #footer button:hover { color: rgba(180, 200, 225, 0.85); }

/* Support modal */
#support-modal {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 50;
  background: rgba(2, 4, 8, 0.75);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  align-items: center;
  justify-content: center;
}
#support-modal.open { display: flex; }
#support-panel {
  background: rgba(6, 10, 20, 0.97);
  border: 1px solid rgba(74, 127, 165, 0.25);
  border-radius: 20px;
  padding: 32px 28px 28px;
  width: min(360px, calc(100vw - 40px));
  position: relative;
}
#support-panel p {
  font-size: 13px;
  color: rgba(74, 127, 165, 0.7);
  margin-bottom: 20px;
  line-height: 1.6;
}
#support-links {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.s-btn {
  display: block;
  padding: 14px 20px;
  background: rgba(10, 20, 36, 0.8);
  border: 1px solid rgba(212, 175, 55, 0.25);
  border-radius: 12px;
  color: #d4af37;
  font-size: 15px;
  font-weight: 600;
  text-decoration: none;
  text-align: center;
  transition: border-color 0.2s, background 0.2s;
}
.s-btn:hover {
  border-color: rgba(212, 175, 55, 0.6);
  background: rgba(20, 36, 60, 0.9);
}
.s-btn small {
  display: block;
  font-size: 11px;
  color: rgba(212, 175, 55, 0.45);
  font-weight: 400;
  margin-top: 2px;
}
#support-close {
  position: absolute;
  top: 14px; right: 16px;
  background: none;
  border: none;
  color: rgba(74, 127, 165, 0.4);
  font-size: 20px;
  cursor: pointer;
  padding: 4px 8px;
  line-height: 1;
  transition: color 0.2s;
}
#support-close:hover { color: rgba(74, 127, 165, 0.8); }

/* Toast */
#toast {
  position: fixed; bottom: 52px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: rgba(4,8,18,.95);
  border: 1px solid rgba(212,175,55,.4);
  border-radius: 12px; padding: 12px 22px;
  font-size: 14px; color: #d4af37;
  z-index: 100; opacity: 0; pointer-events: none;
  transition: transform .3s cubic-bezier(.34,1.56,.64,1), opacity .3s;
  white-space: nowrap;
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
}
#toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
</style>
</head>
<body>

<!-- Canvas: fixed behind everything, always full-viewport -->
<canvas id="c"></canvas>

<!-- Planet UI overlay -->
<div id="planet-ui">
  <div id="search-wrap">
    <input id="search" type="text"
      placeholder="Find an engine… try 'help me practice my job'"
      autocomplete="off" spellcheck="false">
    <div id="results"></div>
  </div>
</div>

<!-- Tooltip -->
<div id="tooltip">
  <div class="tt-name"></div>
  <div class="tt-tagline"></div>
  <div class="tt-code"></div>
  <div class="tt-action"></div>
</div>

<!-- Footer -->
<div id="footer">
  <span>A social experiment · Free forever · </span><button onclick="openSupport()">Support</button><span> · </span><a href="/contribute">Contribute</a>
</div>

<!-- Support modal -->
<div id="support-modal" onclick="if(event.target===this)closeSupport()">
  <div id="support-panel">
    <button id="support-close" onclick="closeSupport()">×</button>
    <p>Hive is free forever at the base tier.<br>Support it if it earns a place in your day.</p>
    <div id="support-links">
      <a class="s-btn" href="https://buy.stripe.com/14A6oJ6Mv3sReEa0YV0RG00" target="_blank" rel="noopener">
        $1.99 <small>per month</small>
      </a>
      <a class="s-btn" href="https://buy.stripe.com/7sYcN79YHe7v53AcHD0RG01" target="_blank" rel="noopener">
        $19 <small>per year</small>
      </a>
      <a class="s-btn" href="https://buy.stripe.com/9B6aEZ7Qzd3rcw2bDz0RG02" target="_blank" rel="noopener">
        $5 <small>one-time</small>
      </a>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.min.js"></script>
<script>
// ─── Support modal ────────────────────────────────────────────────────────────
function openSupport()  { document.getElementById('support-modal').classList.add('open'); }
function closeSupport() { document.getElementById('support-modal').classList.remove('open'); }
document.addEventListener('keydown', e => { if(e.key==='Escape') closeSupport(); });

// ─── Toast ────────────────────────────────────────────────────────────────────
const toastEl = document.getElementById('toast');
let toastTimer;
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 3200);
}

// ─── Guard: Three.js CDN ──────────────────────────────────────────────────────
const canvas = document.getElementById('c');
if (typeof THREE === 'undefined') {
  canvas.style.background = '#060a14';
  document.body.insertAdjacentHTML('beforeend',
    '<div style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);' +
    'color:#4a7fa5;text-align:center;font-size:14px;z-index:999">' +
    '🌐 Loading failed — please refresh.</div>');
  throw new Error('Three.js CDN failed');
}

// ─── Engine Data ──────────────────────────────────────────────────────────────
const ENGINES = [
  { name:'HiveClock',      emoji:'🕐', status:'live', tagline:'The world\'s most humane clock.',          url:'https://hiveclock.hive.baby',           keywords:['clock','time','watch','prayer','world','analog','digital','schedule','timezone','hours','minutes','prayer time'] },
  { name:'HiveClarity',    emoji:'💬', status:'live', tagline:'Say what you actually mean.',              url:'https://hiveclarity.hive.baby',          keywords:['clarity','clear','words','language','express','communicate','thoughts','articulate','confused','understand','explain','structured','thinking','write','rewrite'] },
  { name:'HiveStrength',   emoji:'💪', status:'live', tagline:'Train with intelligence.',                 url:'https://hivestrengthmastery.hive.baby',  keywords:['fitness','workout','gym','training','strength','stronger','stronger','exercise','lift','weights','muscle','body','health','gains','fit','build','physique'] },
  { name:'HiveField',      emoji:'🎯', status:'live', tagline:'Practice your craft.',                    url:'https://hivefield.hive.baby',            keywords:['practice','job','interview','skill','profession','craft','career','rehearse','work','simulate','scenario','prepare','professional','nurse','doctor','teacher','coding','sales','presentation','role'] },
  { name:'HiveWeather',    emoji:'🌤', status:'soon', tagline:'Weather as it feels, not just as it is.', url:null,                                     keywords:['weather','forecast','climate','rain','sun','temperature','wind','cloudy','storm'] },
  { name:'HiveConfession', emoji:'🤫', status:'soon', tagline:'Say the thing you haven\'t said.',        url:null,                                     keywords:['confession','secret','anonymous','truth','share','admit','unsaid','say','burden'] },
];

// ─── Renderer ─────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);

const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x020408);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.01, 100);
camera.position.z = 3.2;
const BASE_Z  = 3.2;
const FOCUS_Z = 2.3;
let targetCamZ = BASE_Z;

// ─── Stars ────────────────────────────────────────────────────────────────────
(function(){
  const n = 2500, p = new Float32Array(n*3);
  for (let i=0;i<n;i++){
    const t=2*Math.PI*Math.random(), f=Math.acos(2*Math.random()-1), r=28+Math.random()*22;
    p[i*3]=r*Math.sin(f)*Math.cos(t); p[i*3+1]=r*Math.sin(f)*Math.sin(t); p[i*3+2]=r*Math.cos(f);
  }
  const g=new THREE.BufferGeometry(); g.setAttribute('position',new THREE.BufferAttribute(p,3));
  scene.add(new THREE.Points(g,new THREE.PointsMaterial({color:0xffffff,size:.055,sizeAttenuation:true,transparent:true,opacity:.6})));
})();

// ─── Lighting ─────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x0a1828, 4));
const keyLight = new THREE.DirectionalLight(0xfff5e0, 3.5);
keyLight.position.set(4, 3, 4);
scene.add(keyLight);
const rimLight = new THREE.DirectionalLight(0x1a3060, 1.5);
rimLight.position.set(-4, -1, -3);
scene.add(rimLight);

// ─── Geodesic Dual ────────────────────────────────────────────────────────────
function buildDual(detail) {
  const geo = new THREE.IcosahedronGeometry(1, detail);
  const pos = geo.attributes.position;
  const idx = geo.index; // null in Three.js r152+ (non-indexed)

  const SCALE = 1e5, kmap = new Map(), uniq = [], remap = new Int32Array(pos.count);
  for (let i = 0; i < pos.count; i++) {
    const x=pos.getX(i), y=pos.getY(i), z=pos.getZ(i);
    const L=Math.sqrt(x*x+y*y+z*z)||1;
    const k=`${Math.round(x/L*SCALE)},${Math.round(y/L*SCALE)},${Math.round(z/L*SCALE)}`;
    if (kmap.has(k)) { remap[i]=kmap.get(k); }
    else { kmap.set(k,uniq.length); remap[i]=uniq.length; uniq.push(new THREE.Vector3(x/L,y/L,z/L)); }
  }

  const triN = idx ? idx.count : pos.count;
  const getI = idx ? i => idx.getX(i) : i => i;
  const faces = [];
  for (let i = 0; i < triN; i += 3) {
    const a=remap[getI(i)], b=remap[getI(i+1)], c=remap[getI(i+2)];
    if (a===b||b===c||a===c) continue;
    faces.push({ centroid: new THREE.Vector3().addVectors(uniq[a],uniq[b]).add(uniq[c]).divideScalar(3).normalize(), verts:[a,b,c] });
  }

  const vf = new Map();
  faces.forEach((f,fi) => f.verts.forEach(vi => { if(!vf.has(vi)) vf.set(vi,[]); vf.get(vi).push(fi); }));

  return uniq.map((center, vi) => {
    const fis = vf.get(vi)||[];
    if (fis.length < 3) return null;
    let up = new THREE.Vector3(0,1,0);
    if (Math.abs(center.dot(up)) > 0.99) up.set(1,0,0);
    const T = new THREE.Vector3().crossVectors(up, center).normalize();
    const B = new THREE.Vector3().crossVectors(center, T);
    const poly = fis
      .map(fi => { const d=faces[fi].centroid.clone().sub(center); return {c:faces[fi].centroid.clone(),a:Math.atan2(d.dot(B),d.dot(T))}; })
      .sort((a,b) => a.a-b.a)
      .map(x => x.c);
    return { center: center.clone(), polygon: poly };
  }).filter(Boolean);
}

const cells = buildDual(3);

// ─── Assign engines to cells ──────────────────────────────────────────────────
const cellToEngine = new Map(), engineToCell = new Map();
const step = Math.floor(cells.length / ENGINES.length);
ENGINES.forEach((e, i) => { const ci = 12 + i*step; cellToEngine.set(ci,e); engineToCell.set(e.name,ci); });

const ALPHA = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
const codes = cells.map(() => ALPHA[Math.random()*ALPHA.length|0]+ALPHA[Math.random()*ALPHA.length|0]+ALPHA[Math.random()*ALPHA.length|0]);

// ─── Colors ───────────────────────────────────────────────────────────────────
const C = {
  live:    new THREE.Color(0xd4af37),
  liveEm:  new THREE.Color(0xb8920a),
  soon:    new THREE.Color(0x2a3d52),
  soonEm:  new THREE.Color(0x1a2d3e),
  empty:   new THREE.Color(0x080f1c),
  emptyEm: new THREE.Color(0x030810),
  hoverL:  new THREE.Color(0xffe066),
  hoverS:  new THREE.Color(0x4a7fa5),
  focus:   new THREE.Color(0xffffff),
};

// ─── Build Cell Meshes ────────────────────────────────────────────────────────
const GROUP = new THREE.Group(); scene.add(GROUP);
const LIFT=0.007, GAP=0.91;
const meshes=[], cellInfo=[];

cells.forEach((cell, ci) => {
  const engine = cellToEngine.get(ci)||null;
  const poly=cell.polygon, n=poly.length;
  const c3=cell.center.clone().multiplyScalar(1+LIFT);
  const verts=[];
  for (let i=0;i<n;i++){
    const a=poly[i].clone().lerp(cell.center,1-GAP).normalize().multiplyScalar(1+LIFT);
    const b=poly[(i+1)%n].clone().lerp(cell.center,1-GAP).normalize().multiplyScalar(1+LIFT);
    verts.push(c3.x,c3.y,c3.z, a.x,a.y,a.z, b.x,b.y,b.z);
  }
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.Float32BufferAttribute(verts,3));
  geo.computeVertexNormals();

  let color,emissive,emissiveIntensity,roughness,metalness;
  if (engine?.status==='live')  { color=C.live.clone();  emissive=C.liveEm.clone();  emissiveIntensity=0.4;  roughness=0.25; metalness=0.65; }
  else if (engine?.status==='soon') { color=C.soon.clone(); emissive=C.soonEm.clone(); emissiveIntensity=0.08; roughness=0.75; metalness=0.1; }
  else { color=C.empty.clone(); emissive=C.emptyEm.clone(); emissiveIntensity=0; roughness=0.95; metalness=0.05; }

  const mesh=new THREE.Mesh(geo, new THREE.MeshStandardMaterial({color,emissive,emissiveIntensity,roughness,metalness,side:THREE.DoubleSide}));
  GROUP.add(mesh); meshes.push(mesh);
  cellInfo.push({engine, code:codes[ci], mesh, color:color.clone(), emissive:emissive.clone(), emissiveIntensity, center:cell.center.clone()});
});

GROUP.add(new THREE.Mesh(new THREE.SphereGeometry(0.98,64,64), new THREE.MeshStandardMaterial({color:0x020810,roughness:.95,metalness:.05})));

cellInfo.forEach(cd => {
  if (cd.engine?.status==='live') {
    const l=new THREE.PointLight(0xd4af37,1.2,1.8); l.position.copy(cd.center).multiplyScalar(1.08); GROUP.add(l);
  }
});

function makeSprite(text, color, alpha, fs) {
  const c=document.createElement('canvas'); c.width=256; c.height=80;
  const ctx=c.getContext('2d');
  ctx.clearRect(0,0,256,80); ctx.globalAlpha=alpha; ctx.fillStyle=color;
  ctx.font=`bold ${fs}px system-ui`; ctx.textAlign='center'; ctx.textBaseline='middle';
  if(alpha>.5){ctx.shadowColor=color; ctx.shadowBlur=10;}
  ctx.fillText(text,128,40);
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(c),transparent:true,depthWrite:false,depthTest:false}));
  return sp;
}
cellInfo.forEach(cd => {
  if(!cd.engine) return;
  const short=cd.engine.name.replace('Hive','').toUpperCase()||cd.engine.name;
  const sp=makeSprite(short, cd.engine.status==='live'?'#f5d060':'#3a5a7a', cd.engine.status==='live'?.9:.5, 28);
  sp.scale.set(0.22,0.07,1); sp.position.copy(cd.center).multiplyScalar(1.045); GROUP.add(sp);
});

// ─── Rotation (quaternion-based) ──────────────────────────────────────────────
const YA=new THREE.Vector3(0,1,0), XA=new THREE.Vector3(1,0,0);
let dragging=false, autoRot=true;
let px=0, py=0, dx=0, dy=0, downX=0, downY=0;
const DAMP=0.91;
let focusQ=null, focusedIdx=-1;

function focusEngine(eng) {
  const ci=engineToCell.get(eng.name); if(ci==null) return;
  restoreFocused();
  focusedIdx=ci;
  const cd=cellInfo[ci];
  cd.mesh.material.color.copy(C.focus); cd.mesh.material.emissive.copy(C.focus); cd.mesh.material.emissiveIntensity=1;
  focusQ=new THREE.Quaternion().setFromUnitVectors(cd.center.clone().normalize(), new THREE.Vector3(0,0,1));
  targetCamZ=FOCUS_Z; autoRot=false;
}
function restoreFocused() {
  if(focusedIdx<0) return;
  const cd=cellInfo[focusedIdx];
  cd.mesh.material.color.copy(cd.color); cd.mesh.material.emissive.copy(cd.emissive); cd.mesh.material.emissiveIntensity=cd.emissiveIntensity;
  focusedIdx=-1;
}
function clearFocus() { restoreFocused(); focusQ=null; targetCamZ=BASE_Z; }

canvas.addEventListener('pointerdown', e=>{
  dragging=true; px=downX=e.clientX; py=downY=e.clientY; dx=dy=0; clearFocus();
});
canvas.addEventListener('pointermove', e=>{
  if(!dragging) return;
  dx=(e.clientX-px)*.006; dy=(e.clientY-py)*.006;
  GROUP.quaternion.multiply(new THREE.Quaternion().setFromAxisAngle(XA,dy)).multiply(new THREE.Quaternion().setFromAxisAngle(YA,dx));
  px=e.clientX; py=e.clientY;
});
canvas.addEventListener('pointerup', e=>{
  if(!dragging) return; dragging=false;
  if(Math.hypot(e.clientX-downX,e.clientY-downY)<6) handleClick(e.clientX,e.clientY);
});
canvas.addEventListener('pointercancel',()=>{ dragging=false; });
canvas.addEventListener('wheel', e=>{ targetCamZ=Math.max(1.5,Math.min(6.5,targetCamZ+e.deltaY*.004)); },{passive:true});

let pinch0=null;
canvas.addEventListener('touchstart',e=>{ if(e.touches.length===2) pinch0=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY); },{passive:true});
canvas.addEventListener('touchmove',e=>{ if(e.touches.length!==2||!pinch0) return; const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY); targetCamZ=Math.max(1.5,Math.min(6.5,targetCamZ-(d-pinch0)*.012)); pinch0=d; },{passive:true});
canvas.addEventListener('touchend',()=>{ pinch0=null; });

// ─── Raycasting ───────────────────────────────────────────────────────────────
const raycaster=new THREE.Raycaster(), mNDC=new THREE.Vector2();
const tooltip=document.getElementById('tooltip');
let hoveredIdx=-1;

function toNDC(cx,cy){ mNDC.x=(cx/window.innerWidth)*2-1; mNDC.y=-(cy/window.innerHeight)*2+1; }

function handleClick(cx,cy){
  toNDC(cx,cy); raycaster.setFromCamera(mNDC,camera);
  const h=raycaster.intersectObjects(meshes); if(!h.length) return;
  const cd=cellInfo[meshes.indexOf(h[0].object)];
  if(cd.engine?.url) window.location.href=cd.engine.url;
}

canvas.addEventListener('mousemove',e=>{ if(!dragging) updateHover(e.clientX,e.clientY); });
canvas.addEventListener('touchstart',e=>{ if(e.touches.length===1) updateHover(e.touches[0].clientX,e.touches[0].clientY); },{passive:true});

function updateHover(cx,cy){
  toNDC(cx,cy); raycaster.setFromCamera(mNDC,camera);
  const hits=raycaster.intersectObjects(meshes);
  const newIdx=hits.length?meshes.indexOf(hits[0].object):-1;
  if(newIdx===hoveredIdx){ if(newIdx>=0) posTip(cx,cy); return; }

  if(hoveredIdx>=0&&hoveredIdx!==focusedIdx){
    const cd=cellInfo[hoveredIdx]; cd.mesh.material.color.copy(cd.color); cd.mesh.material.emissive.copy(cd.emissive); cd.mesh.material.emissiveIntensity=cd.emissiveIntensity;
  }
  hoveredIdx=newIdx;
  if(newIdx>=0){
    const cd=cellInfo[newIdx];
    if(cd.engine){
      const hc=cd.engine.status==='live'?C.hoverL:C.hoverS;
      cd.mesh.material.color.copy(hc); cd.mesh.material.emissive.copy(hc); cd.mesh.material.emissiveIntensity=0.7;
      showTip(cd,cx,cy); canvas.style.cursor=cd.engine.url?'pointer':'default';
    } else { showTip(cd,cx,cy); canvas.style.cursor='default'; }
  } else { tooltip.style.display='none'; canvas.style.cursor='grab'; }
}

function showTip(cd,cx,cy){
  if(cd.engine){
    tooltip.className=cd.engine.status==='soon'?'soon-tt':'';
    tooltip.querySelector('.tt-name').textContent=cd.engine.emoji+'  '+cd.engine.name;
    tooltip.querySelector('.tt-tagline').textContent=cd.engine.tagline;
    tooltip.querySelector('.tt-code').textContent='';
    const a=tooltip.querySelector('.tt-action'); a.textContent=cd.engine.url?'Click to open →':'Coming soon'; a.className='tt-action'+(cd.engine.url?'':' soon-action');
  } else {
    tooltip.className='';
    tooltip.querySelector('.tt-name').textContent=cd.code;
    tooltip.querySelector('.tt-tagline').textContent=''; tooltip.querySelector('.tt-code').textContent='UNASSIGNED NODE'; tooltip.querySelector('.tt-action').textContent='';
  }
  tooltip.style.display='block'; posTip(cx,cy);
}
function posTip(cx,cy){
  let tx=cx+18, ty=cy-70;
  if(tx+240>window.innerWidth-8) tx=cx-258;
  if(ty<8) ty=cy+18;
  if(ty+120>window.innerHeight-8) ty=window.innerHeight-128;
  tooltip.style.left=tx+'px'; tooltip.style.top=ty+'px';
}

// ─── Search ───────────────────────────────────────────────────────────────────
function scoreEng(q,e){
  const words=q.toLowerCase().trim().split(/\s+/).filter(w=>w.length>=3);
  const corpus=(e.name+' '+e.tagline+' '+e.keywords.join(' ')).toLowerCase();
  const corpusWords=corpus.split(/\s+/);
  let t=0;
  for(const w of words){
    if(e.name.toLowerCase().includes(w)){t+=80;continue;}
    if(corpus.includes(w)){t+=40;continue;}
    // query word is prefix of a corpus word (e.g. "str" → "strength")
    if(corpusWords.some(cw=>cw.startsWith(w))){t+=20;continue;}
    // corpus word is prefix of query word (e.g. "stronger" contains "strength")
    if(corpusWords.some(cw=>w.startsWith(cw)&&cw.length>=4)){t+=20;continue;}
  }
  return t;
}

function getBestMatch(q){
  return ENGINES.map(e=>({e,s:scoreEng(q,e)})).filter(x=>x.s>0).sort((a,b)=>b.s-a.s)[0];
}

const searchEl=document.getElementById('search'), resultsEl=document.getElementById('results');
searchEl.addEventListener('input',()=>{
  const q=searchEl.value.trim(); resultsEl.innerHTML='';
  if(!q){clearFocus();return;}
  const all=ENGINES.map(e=>({e,s:scoreEng(q,e)})).filter(x=>x.s>0).sort((a,b)=>b.s-a.s);
  if(all.length) focusEngine(all[0].e);
  for(const {e} of all.slice(0,5)){
    const div=document.createElement('div');
    div.className='result-item'+(e.status==='soon'?' soon':'');
    div.innerHTML=`<span style="font-size:22px;line-height:1">${e.emoji}</span><div><div class="result-name">${e.name}</div><div class="result-tagline">${e.tagline}</div></div>`;
    div.addEventListener('mousedown',()=>{ if(e.url) window.location.href=e.url; else{focusEngine(e);resultsEl.innerHTML='';searchEl.blur();} });
    resultsEl.appendChild(div);
  }
});
searchEl.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    const best=getBestMatch(searchEl.value.trim());
    if(best?.e.url) window.location.href=best.e.url;
  }
});
searchEl.addEventListener('blur',()=>setTimeout(()=>{resultsEl.innerHTML=''},200));
searchEl.addEventListener('focus',()=>{ autoRot=false; });

// ─── Animate ──────────────────────────────────────────────────────────────────
const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const t=clock.getElapsedTime();

  if(focusQ&&!dragging){
    GROUP.quaternion.slerp(focusQ,.055);
  } else if(autoRot&&!dragging){
    GROUP.quaternion.multiply(new THREE.Quaternion().setFromAxisAngle(YA,.0007));
  } else if(!dragging&&(Math.abs(dx)>1e-5||Math.abs(dy)>1e-5)){
    GROUP.quaternion.multiply(new THREE.Quaternion().setFromAxisAngle(XA,dy)).multiply(new THREE.Quaternion().setFromAxisAngle(YA,dx));
    dx*=DAMP; dy*=DAMP;
  }

  camera.position.z+=(targetCamZ-camera.position.z)*.06;

  cellInfo.forEach((cd,i)=>{
    if(cd.engine?.status==='live'&&i!==hoveredIdx&&i!==focusedIdx)
      cd.mesh.material.emissiveIntensity=.32+.12*Math.sin(t*1.4+i*.9);
  });

  renderer.render(scene,camera);
}
animate();

// ─── Resize ───────────────────────────────────────────────────────────────────
window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>
