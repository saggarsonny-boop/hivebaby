<!DOCTYPE html>
<html>
<body>
    <canvas id="c"></canvas>
    <script>
        const img = new Image();
        img.src = '/ud-logo-micro.png';
        img.onload = () => {
            const c = document.getElementById('c');
            const ctx = c.getContext('2d');
            c.width = img.width;
            c.height = img.height;
            ctx.drawImage(img, 0, 0);
            const data = ctx.getImageData(0, 0, c.width, c.height).data;
            let r=0,g=0,b=0, count=0;
            for(let i=0; i<data.length; i+=4) {
                if(data[i+3]>0) {
                    r+=data[i]; g+=data[i+1]; b+=data[i+2]; count++;
                }
            }
            document.body.innerHTML += <div id='res'>AVERAGE_COLOR: rgb( + Math.round(r/count) + , + Math.round(g/count) + , + Math.round(b/count) + )</div>;
        };
    </script>
</body>
</html>
