name: Ops - Fix RESEND_API_KEY on hive-testing-station

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fix-resend:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: List all Vercel projects
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN_MAIN }}
        run: |
          echo "=== All Vercel projects ==="
          curl -s "https://api.vercel.com/v9/projects?limit=100" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          for p in d.get('projects',[]):
              print(p['name'], p['id'])
          "

      - name: Find hive-testing-station project ID
        id: ids
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN_MAIN }}
        run: |
          PROJECTS=$(curl -s "https://api.vercel.com/v9/projects?limit=100" \
            -H "Authorization: Bearer $VERCEL_TOKEN")

          TESTING_ID=$(echo "$PROJECTS" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          for p in d.get('projects',[]):
              n=p['name'].lower()
              if 'testing' in n or ('hive' in n and 'test' in n):
                  print(p['id'])
                  break
          ")

          echo "hive-testing-station ID: $TESTING_ID"
          echo "testing_id=$TESTING_ID" >> "$GITHUB_OUTPUT"

      - name: Check current env vars on hive-testing-station
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN_MAIN }}
          TESTING_ID: ${{ steps.ids.outputs.testing_id }}
        run: |
          echo "=== Env vars on hive-testing-station ==="
          curl -s "https://api.vercel.com/v9/projects/$TESTING_ID/env" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          envs=d.get('envs',[])
          if not envs:
              print('No env vars found (or error):', json.dumps(d)[:200])
          for e in envs:
              val=e.get('value','')
              status='SET' if val else 'EMPTY'
              print(e['key'], status, e.get('target',[]))
          "

      - name: Remove existing RESEND_API_KEY if present
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN_MAIN }}
          TESTING_ID: ${{ steps.ids.outputs.testing_id }}
        run: |
          EXISTING_ID=$(curl -s "https://api.vercel.com/v9/projects/$TESTING_ID/env" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          for e in d.get('envs',[]):
              if e['key']=='RESEND_API_KEY':
                  print(e['id'])
                  break
          ")
          if [ -n "$EXISTING_ID" ]; then
            echo "Removing existing RESEND_API_KEY (id=$EXISTING_ID)"
            curl -s -X DELETE \
              "https://api.vercel.com/v9/projects/$TESTING_ID/env/$EXISTING_ID" \
              -H "Authorization: Bearer $VERCEL_TOKEN" -o /dev/null
            echo "Removed"
          else
            echo "No existing RESEND_API_KEY found"
          fi

      - name: Set RESEND_API_KEY on hive-testing-station
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN_MAIN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TESTING_ID: ${{ steps.ids.outputs.testing_id }}
        run: |
          echo "Setting RESEND_API_KEY..."
          RESULT=$(curl -s -X POST \
            "https://api.vercel.com/v9/projects/$TESTING_ID/env" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"key\":\"RESEND_API_KEY\",\"value\":\"$RESEND_API_KEY\",\"type\":\"encrypted\",\"target\":[\"production\",\"preview\"]}")
          echo "$RESULT" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          if d.get('key'):
              print('OK: RESEND_API_KEY set on hive-testing-station')
          else:
              print('ERROR:', json.dumps(d))
          "

      - name: Trigger redeploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN_MAIN }}
          TESTING_ID: ${{ steps.ids.outputs.testing_id }}
        run: |
          DEPLOY_ID=$(curl -s \
            "https://api.vercel.com/v6/deployments?projectId=$TESTING_ID&limit=1&target=production" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          deps=d.get('deployments',[])
          if deps:
              print(deps[0]['uid'])
          ")
          echo "Redeploying: $DEPLOY_ID"
          curl -s -X POST \
            "https://api.vercel.com/v13/deployments?forceNew=1&withLatestCommit=1" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"deploymentId\":\"$DEPLOY_ID\",\"name\":\"hive-testing-station\"}" \
            | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          print('New deployment:', d.get('url', d.get('error',{}).get('message','unknown')))
          "

      - name: Wait and verify
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN_MAIN }}
          TESTING_ID: ${{ steps.ids.outputs.testing_id }}
        run: |
          echo "Waiting 90s for redeployment..."
          sleep 90
          echo "=== Final env var check ==="
          curl -s "https://api.vercel.com/v9/projects/$TESTING_ID/env" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          for e in d.get('envs',[]):
              val=e.get('value','')
              print(e['key'], 'SET' if val else 'EMPTY')
          "
          echo "=== /api/health ==="
          curl -s --max-time 20 https://test.hive.baby/api/health || echo "health endpoint unreachable"
