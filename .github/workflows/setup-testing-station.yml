name: Ops - Setup hive-testing-station Vercel env vars

on:
  workflow_dispatch:
    inputs:
      database_url:
        description: 'Neon DATABASE_URL (leave blank to use repo secret)'
        required: false
        default: ''
      resend_api_key:
        description: 'Resend API key (leave blank to use repo secret)'
        required: false
        default: ''
      stripe_secret_key:
        description: 'Stripe secret key (leave blank to use repo secret)'
        required: false
        default: ''

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Validate Vercel token
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN_MAIN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "ERROR: VERCEL_TOKEN_MAIN secret is not set"
            exit 1
          fi
          echo "Vercel token present (${#VERCEL_TOKEN} chars)"

      - name: Find hive-testing-station project ID
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN_MAIN }}
        run: |
          RESP=$(curl -s "https://api.vercel.com/v9/projects?search=hive-testing-station" \
            -H "Authorization: Bearer $VERCEL_TOKEN")
          PROJECT_ID=$(echo "$RESP" | jq -r '.projects[]? | select(.name | ascii_downcase | contains("testing-station")) | .id' | head -1)
          if [ -z "$PROJECT_ID" ]; then
            echo "Projects available:"
            echo "$RESP" | jq -r '.projects[].name' | head -20
            exit 1
          fi
          echo "Found: $PROJECT_ID"
          echo "PROJECT_ID=$PROJECT_ID" >> "$GITHUB_ENV"

      - name: List current env vars
        continue-on-error: true
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN_MAIN }}
        run: |
          echo "Current env vars on $PROJECT_ID:"
          curl -s "https://api.vercel.com/v9/projects/$PROJECT_ID/env" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            | jq -r '.envs[]? | .key' | sort

      - name: Set env vars
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN_MAIN }}
          IN_DATABASE_URL: ${{ inputs.database_url }}
          SEC_DATABASE_URL: ${{ secrets.DATABASE_URL }}
          IN_RESEND_API_KEY: ${{ inputs.resend_api_key }}
          SEC_RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          IN_STRIPE_SECRET_KEY: ${{ inputs.stripe_secret_key }}
          SEC_STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          SEC_CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          upsert_env() {
            local KEY="$1" VALUE="$2"
            [ -z "$VALUE" ] && { echo "  SKIP $KEY"; return; }
            HTTP=$(curl -s -o /tmp/ev.json -w "%{http_code}" \
              -X POST "https://api.vercel.com/v9/projects/$PROJECT_ID/env" \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              -H "Content-Type: application/json" \
              --data-binary "{\"key\":\"$KEY\",\"value\":$(printf '%s' "$VALUE" | jq -Rs .),\"type\":\"encrypted\",\"target\":[\"production\",\"preview\"]}")
            if [ "$HTTP" = "409" ]; then
              EID=$(curl -s "https://api.vercel.com/v9/projects/$PROJECT_ID/env" \
                -H "Authorization: Bearer $VERCEL_TOKEN" \
                | jq -r --arg K "$KEY" '.envs[]? | select(.key==$K) | .id' | head -1)
              if [ -n "$EID" ]; then
                curl -s -X PATCH "https://api.vercel.com/v9/projects/$PROJECT_ID/env/$EID" \
                  -H "Authorization: Bearer $VERCEL_TOKEN" \
                  -H "Content-Type: application/json" \
                  --data-binary "{\"value\":$(printf '%s' "$VALUE" | jq -Rs .),\"target\":[\"production\",\"preview\"]}" > /dev/null
                echo "  UPDATED $KEY"
              fi
            elif [ "$HTTP" = "200" ] || [ "$HTTP" = "201" ]; then
              echo "  CREATED $KEY"
            else
              echo "  FAILED $KEY HTTP=$HTTP: $(cat /tmp/ev.json)"
            fi
          }

          DATABASE_URL="${IN_DATABASE_URL:-$SEC_DATABASE_URL}"
          RESEND_API_KEY="${IN_RESEND_API_KEY:-$SEC_RESEND_API_KEY}"
          STRIPE_SECRET_KEY="${IN_STRIPE_SECRET_KEY:-$SEC_STRIPE_SECRET_KEY}"
          CRON_SECRET="${SEC_CRON_SECRET:-$(openssl rand -hex 16)}"
          ADMIN_SECRET="$(openssl rand -hex 16)"

          upsert_env "DATABASE_URL"        "$DATABASE_URL"
          upsert_env "RESEND_API_KEY"      "$RESEND_API_KEY"
          upsert_env "STRIPE_SECRET_KEY"   "$STRIPE_SECRET_KEY"
          upsert_env "CRON_SECRET"         "$CRON_SECRET"
          upsert_env "ADMIN_SECRET"        "$ADMIN_SECRET"
          upsert_env "NEXT_PUBLIC_APP_URL" "https://test.hive.baby"

          echo "CRON_SECRET=$CRON_SECRET" >> "$GITHUB_ENV"

      - name: Trigger redeploy
        continue-on-error: true
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN_MAIN }}
        run: |
          LATEST=$(curl -s "https://api.vercel.com/v6/deployments?projectId=$PROJECT_ID&limit=1&target=production" \
            -H "Authorization: Bearer $VERCEL_TOKEN" | jq -r '.deployments[0].uid // empty')
          if [ -z "$LATEST" ]; then
            echo "No production deployment found - skipping"
            exit 0
          fi
          PROJ_NAME=$(curl -s "https://api.vercel.com/v9/projects/$PROJECT_ID" \
            -H "Authorization: Bearer $VERCEL_TOKEN" | jq -r '.name')
          RESP=$(curl -s -X POST "https://api.vercel.com/v13/deployments" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"$PROJ_NAME\",\"deploymentId\":\"$LATEST\",\"target\":\"production\"}")
          echo "Redeploy triggered: $(echo "$RESP" | jq -r '.id // "failed"')"

      - name: Wait and run migrations
        continue-on-error: true
        run: |
          echo "Waiting 90s for deployment..."
          sleep 90
          RESP=$(curl -s -w "\nHTTP=%{http_code}" \
            -X POST "https://test.hive.baby/api/migrate" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $CRON_SECRET" \
            --max-time 30)
          echo "Migrate response: $RESP"

      - name: Smoke test
        continue-on-error: true
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" https://test.hive.baby --max-time 15)
          echo "test.hive.baby -> HTTP $CODE"
          [ "$CODE" = "200" ] && echo "PASS" || echo "WARN: non-200 response"
