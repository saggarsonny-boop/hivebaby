name: HiveBuyStuff Deploy and Migrate

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'hive-hivebuystuff/**'
      - '.github/workflows/hivebuystuff-deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Resolve Vercel token
        env:
          V1: ${{ secrets.VERCEL_TOKEN_MAIN }}
          V2: ${{ secrets.VERCEL_TOKEN }}
        run: |
          TOKEN="${V1:-$V2}"
          if [ -z "$TOKEN" ]; then echo "ERROR: No Vercel token"; exit 1; fi
          echo "VERCEL_TOKEN=$TOKEN" >> "$GITHUB_ENV"
          echo "Token present, length=${#TOKEN}"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Link Vercel project
        working-directory: hive-hivebuystuff
        run: |
          vercel link \
            --token "$VERCEL_TOKEN" \
            --yes \
            --project hive-hivebuystuff 2>&1 || true
          echo "Project JSON: $(cat .vercel/project.json 2>/dev/null || echo 'not found')"

      - name: Pull Vercel env
        working-directory: hive-hivebuystuff
        run: |
          vercel pull \
            --token "$VERCEL_TOKEN" \
            --yes \
            --environment production 2>&1 || true

      - name: Build
        working-directory: hive-hivebuystuff
        run: |
          vercel build --prod --token "$VERCEL_TOKEN" 2>&1

      - name: Deploy prebuilt to production
        working-directory: hive-hivebuystuff
        run: |
          OUTPUT=$(vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN" 2>&1)
          echo "$OUTPUT"
          URL=$(echo "$OUTPUT" | grep -Eo 'https://[a-zA-Z0-9._-]+\.vercel\.app' | tail -1)
          echo "DEPLOY_URL=$URL" >> "$GITHUB_ENV"
          echo "Deployed: $URL"

      - name: Set production env vars
        run: |
          PID=$(cat hive-hivebuystuff/.vercel/project.json 2>/dev/null | jq -r '.projectId // empty')
          if [ -z "$PID" ]; then echo "No project ID, skipping"; exit 0; fi
          echo "Project ID: $PID"
          set_ev() {
            K=$1; V=$2
            H=$(curl -s -o /tmp/ev.json -w "%{http_code}" \
              -X POST "https://api.vercel.com/v9/projects/$PID/env" \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"key\":\"$K\",\"value\":$(printf '%s' "$V" | jq -Rs .),\"type\":\"encrypted\",\"target\":[\"production\",\"preview\"]}")
            if [ "$H" = "409" ]; then
              ID=$(jq -r '.error.envVarId // empty' /tmp/ev.json)
              [ -n "$ID" ] && curl -s -X PATCH \
                "https://api.vercel.com/v9/projects/$PID/env/$ID" \
                -H "Authorization: Bearer $VERCEL_TOKEN" \
                -H "Content-Type: application/json" \
                -d "{\"value\":$(printf '%s' "$V" | jq -Rs .),\"target\":[\"production\",\"preview\"]}" > /dev/null
              echo "$K updated"
            else
              echo "$K HTTP $H"
            fi
          }
          set_ev "ANTHROPIC_API_KEY" "$ANTHROPIC_API_KEY"
          set_ev "DATABASE_URL" "$DATABASE_URL"

      - name: Run DB migration via psql
        run: |
          sudo apt-get install -y -q postgresql-client
          psql "$DATABASE_URL" -c "CREATE TABLE IF NOT EXISTS hbs_templates (id UUID PRIMARY KEY DEFAULT gen_random_uuid(), user_id TEXT NOT NULL, name TEXT NOT NULL, items JSONB NOT NULL DEFAULT '[]', cadence TEXT, created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(), updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW(), UNIQUE (user_id, name));"
          psql "$DATABASE_URL" -c "CREATE TABLE IF NOT EXISTS hbs_preferences (user_id TEXT PRIMARY KEY, budget_ceiling NUMERIC, substitution_tolerance TEXT NOT NULL DEFAULT 'flexible' CHECK (substitution_tolerance IN ('strict', 'flexible', 'auto')), preferred_backends JSONB NOT NULL DEFAULT '[]', dietary_rules JSONB NOT NULL DEFAULT '[]', delivery_constraints JSONB NOT NULL DEFAULT '{}', updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW());"
          echo "Migration complete"

      - name: Health check
        run: |
          sleep 15
          for URL in "$DEPLOY_URL" "https://hivebuystuff.hive.baby"; do
            if [ -n "$URL" ]; then
              R=$(curl -s "$URL/api/health" --max-time 12 2>&1)
              echo "$URL: $R"
            fi
          done
