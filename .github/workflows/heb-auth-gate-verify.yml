name: Ops — Verify HEB home-page auth gate (one-off)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'hive-engine-builder branch to verify'
        required: true
        default: 'heb-home-auth-gate'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Trigger Vercel preview deploy + run authed tests
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN_MAIN }}
          BRANCH:       ${{ inputs.branch }}
        run: |
          set -uo pipefail
          die() { echo "::error::$1"; exit 1; }
          [ -n "${VERCEL_TOKEN:-}" ] || die "VERCEL_TOKEN_MAIN missing"

          AUTH=(-H "Authorization: Bearer $VERCEL_TOKEN")

          # ---- 1. Resolve project id and GitHub repoId ----
          echo "===== 1. Resolve Vercel project + GitHub repoId ====="
          PROJ=$(curl -s "${AUTH[@]}" "https://api.vercel.com/v9/projects/hive-engine-builder")
          PROJ_ID=$(echo "$PROJ" | jq -r '.id // empty')
          [ -n "$PROJ_ID" ] || { echo "$PROJ" | jq '.'; die "project lookup failed"; }
          # The numeric GitHub repo ID is on the project's link object.
          REPO_ID=$(echo "$PROJ" | jq -r '.link.repoId // empty')
          [ -n "$REPO_ID" ] || die "could not resolve link.repoId on project"
          echo "project: $PROJ_ID  repoId: $REPO_ID"

          # ---- 2. Resolve HEAD sha for the branch ----
          echo
          echo "===== 2. Resolve $BRANCH HEAD sha (public GitHub API) ====="
          # No auth needed for the unauthenticated rate-limited GitHub API on a
          # private repo: it'll fail. Use the Vercel project's repo to read the
          # ref via Vercel API instead. Vercel exposes /v9/projects/{id}/branches
          # but a more robust path is to deploy without sha — Vercel resolves
          # the branch HEAD itself when only `ref` is given.

          # ---- 3. Trigger Vercel preview deploy via gitSource ----
          echo
          echo "===== 3. POST /v13/deployments (preview, branch=$BRANCH) ====="
          # Omit `target` — Vercel rejects "preview" but defaults to a preview
          # deployment when target is absent and the ref isn't the production branch.
          PAYLOAD=$(jq -n \
            --arg name "hive-engine-builder" \
            --arg ref  "$BRANCH" \
            --arg repoId "$REPO_ID" \
            '{
              name: $name,
              gitSource: { type: "github", ref: $ref, repoId: ($repoId | tonumber) }
            }')
          RESP=$(curl -s -X POST "${AUTH[@]}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://api.vercel.com/v13/deployments")
          DEP_ID=$(echo "$RESP" | jq -r '.id // empty')
          DEP_URL=$(echo "$RESP" | jq -r '.url // empty')
          if [ -z "$DEP_ID" ] || [ -z "$DEP_URL" ]; then
            echo "deploy create response:"
            echo "$RESP" | jq '.'
            die "deploy create failed"
          fi
          PREVIEW_URL="https://$DEP_URL"
          echo "deployment id:   $DEP_ID"
          echo "preview URL:     $PREVIEW_URL"

          # ---- 4. Poll until READY ----
          echo
          echo "===== 4. Poll deployment until READY ====="
          for i in $(seq 1 60); do
            S=$(curl -s "${AUTH[@]}" "https://api.vercel.com/v13/deployments/$DEP_ID")
            STATE=$(echo "$S" | jq -r '.readyState // .status // empty')
            echo "  attempt $i: state=$STATE"
            case "$STATE" in
              READY) break ;;
              ERROR|CANCELED|DELETED)
                echo "$S" | jq '.errorMessage, .errorLink' 2>/dev/null
                die "deploy ended in $STATE"
                ;;
            esac
            sleep 6
          done
          [ "$STATE" = "READY" ] || die "deploy did not reach READY in 6 minutes"

          # Vercel Deployment Protection gates preview URLs with 401 unless we
          # pass a bypass token. Pull one from the project's protectionBypass map.
          BYPASS=$(echo "$PROJ" | jq -r '
            (.protectionBypass // {}) | to_entries | .[0].key // empty
          ')
          if [ -n "$BYPASS" ]; then
            echo "::add-mask::$BYPASS"
            echo "protection bypass token present (will pass via x-vercel-protection-bypass header)"
            BYPASS_HEADERS=(-H "x-vercel-protection-bypass: $BYPASS" -H "x-vercel-set-bypass-cookie: true")
          else
            echo "::warning::No protectionBypass token on project — preview likely 401-gated."
            BYPASS_HEADERS=()
          fi

          # Probe root once it's READY
          ROOT_STATUS=$(curl -s -o /tmp/root.html -w "%{http_code}" --max-time 10 \
            "${BYPASS_HEADERS[@]}" "$PREVIEW_URL/")
          [ "$ROOT_STATUS" = "200" ] || die "preview root returned $ROOT_STATUS (deployment protection?)"
          echo "✓ preview root 200"

          # ---- 5. Resolve HEB_CREATOR_SECRET (decrypt) ----
          echo
          echo "===== 5. Get HEB_CREATOR_SECRET ====="
          ENV_LIST=$(curl -s "${AUTH[@]}" "https://api.vercel.com/v9/projects/$PROJ_ID/env")
          ENV_ID=$(echo "$ENV_LIST" | jq -r '.envs[]? | select(.key=="HEB_CREATOR_SECRET") | .id' | head -1)
          [ -n "$ENV_ID" ] && [ "$ENV_ID" != "null" ] || die "HEB_CREATOR_SECRET not on project"
          DETAIL=$(curl -s "${AUTH[@]}" "https://api.vercel.com/v1/projects/$PROJ_ID/env/$ENV_ID?decrypt=true")
          SECRET=$(echo "$DETAIL" | jq -r '.value // empty')
          [ -n "$SECRET" ] || die "could not decrypt HEB_CREATOR_SECRET"
          echo "::add-mask::$SECRET"
          SHA=$(printf '%s' "$SECRET" | sha256sum | cut -c1-12)
          echo "secret retrieved (sha256:$SHA)"

          # ---- 6. Auth-gate HTML present ----
          echo
          echo "===== 6. Auth gate text in initial HTML ====="
          if grep -qi "Unlock\|Creator secret" /tmp/root.html; then
            echo "✓ Auth gate text present in HTML"
          else
            echo "::warning::No 'Unlock' or 'Creator secret' in initial HTML (client-rendered; OK)"
          fi

          # ---- 7. Validation probe (mirrors home-page useEffect) ----
          echo
          echo "===== 7. Validate-secret probe ====="
          VAL_STATUS=$(curl -s -o /tmp/val.json -w "%{http_code}" \
            "${BYPASS_HEADERS[@]}" \
            "$PREVIEW_URL/api/engine-memory?slug=__validation__&types=chat_message&limit=1" \
            -H "x-creator-secret: $SECRET")
          [ "$VAL_STATUS" = "200" ] || { cat /tmp/val.json | head -c 400; die "validation GET=$VAL_STATUS"; }
          echo "✓ Validation GET 200 (count=$(jq -r '.count // 0' /tmp/val.json))"

          # ---- 8. POST verification test 1 ----
          echo
          echo "===== 8. POST verification test 1 ====="
          P1=$(curl -s -o /tmp/p1.json -w "%{http_code}" -X POST \
            "${BYPASS_HEADERS[@]}" \
            "$PREVIEW_URL/api/engine-memory" \
            -H "Content-Type: application/json" -H "x-creator-secret: $SECRET" \
            -d '{"slug":"__verify-auth-gate__","type":"chat_message","role":"creator","content":"verification test 1"}')
          [ "$P1" = "200" ] || { cat /tmp/p1.json; die "POST 1 status=$P1"; }
          echo "✓ POST 1 status=200, id=$(jq -r '.id // "?"' /tmp/p1.json)"

          # ---- 9. POST verification test 2 ----
          echo
          echo "===== 9. POST verification test 2 ====="
          P2=$(curl -s -o /tmp/p2.json -w "%{http_code}" -X POST \
            "${BYPASS_HEADERS[@]}" \
            "$PREVIEW_URL/api/engine-memory" \
            -H "Content-Type: application/json" -H "x-creator-secret: $SECRET" \
            -d '{"slug":"__verify-auth-gate__","type":"chat_message","role":"claude","content":"verification test 2"}')
          [ "$P2" = "200" ] || { cat /tmp/p2.json; die "POST 2 status=$P2"; }
          echo "✓ POST 2 status=200, id=$(jq -r '.id // "?"' /tmp/p2.json)"

          # ---- 10. GET back ----
          echo
          echo "===== 10. GET back (refresh-then-mount simulation) ====="
          G=$(curl -s -o /tmp/g.json -w "%{http_code}" \
            "${BYPASS_HEADERS[@]}" \
            "$PREVIEW_URL/api/engine-memory?slug=__verify-auth-gate__&types=chat_message&limit=10" \
            -H "x-creator-secret: $SECRET")
          [ "$G" = "200" ] || { cat /tmp/g.json; die "GET status=$G"; }
          echo "Returned entries:"
          jq -c '.entries | map({role, content})' /tmp/g.json
          C1=$(jq -r '[.entries[]? | select(.content=="verification test 1")] | length' /tmp/g.json)
          C2=$(jq -r '[.entries[]? | select(.content=="verification test 2")] | length' /tmp/g.json)
          [ "$C1" -ge 1 ] && [ "$C2" -ge 1 ] || die "round-trip incomplete (c1=$C1 c2=$C2)"
          echo "✓ Both messages round-tripped (test 1: ${C1}, test 2: ${C2})"

          # ---- 11. Bad-secret negative test ----
          echo
          echo "===== 11. Bad-secret negative test ====="
          BAD=$(curl -s -o /dev/null -w "%{http_code}" \
            "${BYPASS_HEADERS[@]}" \
            "$PREVIEW_URL/api/engine-memory?slug=__validation__&types=chat_message&limit=1" \
            -H "x-creator-secret: definitely-wrong-secret-xyz")
          if [ "$BAD" = "404" ]; then
            echo "✓ Wrong secret returns 404"
          else
            echo "::warning::Wrong secret returned $BAD (expected 404)"
          fi

          # ---- 12. Cleanup ----
          echo
          echo "===== 12. Cleanup synthetic rows ====="
          PURGE=$(curl -s -X DELETE \
            "${BYPASS_HEADERS[@]}" \
            "$PREVIEW_URL/api/engine-memory?slug=__verify-auth-gate__&purge=true" \
            -H "x-creator-secret: $SECRET")
          echo "purge: $(echo "$PURGE" | jq -c .)"

          echo
          echo "===== ALL TESTS PASSED ====="
          echo "Preview URL:     $PREVIEW_URL"
          echo "Validation GET:  200"
          echo "POST 1 + POST 2: 200, 200"
          echo "Round-trip:      both entries returned"
          echo "Wrong secret:    $BAD"
