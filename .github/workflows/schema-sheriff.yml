name: Schema Sheriff — Universal Document Routes

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  issues: write

jobs:
  schema-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout universal-document
        uses: actions/checkout@v4
        with:
          repository: saggarsonny-boop/universal-document

      - name: Validate UDS route schema compliance
        id: check
        run: |
          > /tmp/violations.txt
          FAILED=0

          check_route() {
            local NAME="$1"
            local FILE="$2"
            local PASS=1

            if [ ! -f "$FILE" ]; then
              printf "**%s** — file not found: \`%s\`\n\n" "$NAME" "$FILE" >> /tmp/violations.txt
              echo "FAIL: $NAME — file missing"
              FAILED=1
              return
            fi

            # Required UDS top-level fields
            for field in ud_version state metadata manifest blocks seal; do
              if ! grep -q "$field" "$FILE" 2>/dev/null; then
                printf "**%s** — missing required field: \`%s\`\n\n" "$NAME" "$field" >> /tmp/violations.txt
                echo "FAIL: $NAME missing '$field'"
                PASS=0
                FAILED=1
              fi
            done

            # Must produce UDS state (sealed document)
            if ! grep -qE "'UDS'|\"UDS\"|state.*UDS" "$FILE" 2>/dev/null; then
              printf "**%s** — does not produce UDS (Sealed) state\n\n" "$NAME" >> /tmp/violations.txt
              echo "FAIL: $NAME — no UDS state found"
              PASS=0
              FAILED=1
            fi

            # metadata must have required sub-fields
            for meta_field in title created_at document_type; do
              if ! grep -q "$meta_field" "$FILE" 2>/dev/null; then
                printf "**%s** — metadata missing sub-field: \`%s\`\n\n" "$NAME" "$meta_field" >> /tmp/violations.txt
                echo "FAIL: $NAME metadata missing '$meta_field'"
                PASS=0
                FAILED=1
              fi
            done

            if [ $PASS -eq 1 ]; then
              echo "OK: $NAME"
            fi
          }

          check_route "pharmacy"              "apps/utilities/src/app/api/pharmacy/route.ts"
          check_route "translate"             "apps/utilities/src/app/api/translate/route.ts"
          check_route "contract-intelligence" "apps/utilities/src/app/api/contract-intelligence/route.ts"
          check_route "emr-export"            "apps/utilities/src/app/api/emr-export/route.ts"
          check_route "converter"             "apps/converter/src/lib/convert.ts"

          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"

      - name: Ensure schema-violation label exists
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            "https://api.github.com/repos/saggarsonny-boop/hivebaby/labels" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"name":"schema-violation","color":"e4e669","description":"UDS schema compliance failure"}' \
            -o /dev/null || true

      - name: Create GitHub issue on violation
        if: steps.check.outputs.failed == '1'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VIOLATIONS=$(cat /tmp/violations.txt)
          TITLE="Schema Sheriff — UDS violation detected $(date -u '+%Y-%m-%d %H:%M UTC')"

          BODY=$(jq -n \
            --arg title "$TITLE" \
            --arg violations "$VIOLATIONS" \
            --arg run_id "${{ github.run_id }}" \
            --arg repo "${{ github.repository }}" \
            --arg ts "$(date -u '+%Y-%m-%d %H:%M UTC')" \
            '{
              title: $title,
              labels: ["schema-violation"],
              body: ("## UDS Schema Violations\n\n**Run:** [" + $run_id + "](https://github.com/" + $repo + "/actions/runs/" + $run_id + ")\n**Time:** " + $ts + "\n\n---\n\n" + $violations + "\n---\n*Auto-generated by schema-sheriff.yml. Fix the route and close this issue.*")
            }')

          curl -s -X POST \
            "https://api.github.com/repos/saggarsonny-boop/hivebaby/issues" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$BODY" \
            | jq -r '"Issue created: " + (.html_url // "failed")'

      - name: All clear
        if: steps.check.outputs.failed != '1'
        run: echo "All UDS-producing routes pass schema compliance check"

      - name: Fail workflow on violations
        if: steps.check.outputs.failed == '1'
        run: exit 1
