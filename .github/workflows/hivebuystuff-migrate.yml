name: HiveBuyStuff — Run DB Migration

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/hivebuystuff-migrate.yml'

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Resolve Vercel token
        env:
          VERCEL_TOKEN_MAIN: ${{ secrets.VERCEL_TOKEN_MAIN }}
          VERCEL_TOKEN_FALLBACK: ${{ secrets.VERCEL_TOKEN }}
        run: |
          TOKEN="${VERCEL_TOKEN_MAIN:-$VERCEL_TOKEN_FALLBACK}"
          if [ -z "$TOKEN" ]; then echo "ERROR: No Vercel token"; exit 1; fi
          echo "VERCEL_TOKEN=$TOKEN" >> "$GITHUB_ENV"
          echo "Token length: ${#TOKEN}"

      - name: Find deployment URL (verbose)
        run: |
          # Try 1: get project by name
          echo "=== Vercel /v9/projects/hive-hivebuystuff ==="
          PROJECT=$(curl -s "https://api.vercel.com/v9/projects/hive-hivebuystuff" \
            -H "Authorization: Bearer $VERCEL_TOKEN")
          echo "$PROJECT" | jq -c '{id,name,framework,alias:(.alias//[])|length}' 2>/dev/null || echo "$PROJECT"

          PROJECT_ID=$(echo "$PROJECT" | jq -r '.id // empty')
          echo "Project ID: '$PROJECT_ID'"

          DEPLOY_URL=""

          if [ -n "$PROJECT_ID" ]; then
            echo "=== Vercel /v6/deployments ==="
            DEPS=$(curl -s \
              "https://api.vercel.com/v6/deployments?projectId=$PROJECT_ID&limit=3&target=production" \
              -H "Authorization: Bearer $VERCEL_TOKEN")
            echo "$DEPS" | jq -c '[.deployments[]? | {url,state,readyState}]' 2>/dev/null || echo "$DEPS"
            DEPLOY_URL=$(echo "$DEPS" | jq -r '.deployments[0].url // empty')
            echo "Deployment URL from API: '$DEPLOY_URL'"
          fi

          # Try 2: well-known vercel.app domain
          if [ -z "$DEPLOY_URL" ]; then
            DEPLOY_URL="hive-hivebuystuff.vercel.app"
            echo "Falling back to: $DEPLOY_URL"
          fi

          echo "DEPLOY_URL=https://$DEPLOY_URL" >> "$GITHUB_ENV"
          echo "PROJECT_ID=$PROJECT_ID" >> "$GITHUB_ENV"

      - name: Run migration (try all URLs)
        run: |
          # Build list of URLs to try
          URLS=("$DEPLOY_URL" "https://hivebuystuff.hive.baby" "https://buy.hive.baby")

          SUCCESS=false
          for URL in "${URLS[@]}"; do
            echo "→ Trying POST $URL/api/hbs/migrate"
            RESULT=$(curl -s -X POST "$URL/api/hbs/migrate" \
              --max-time 20 -w "\nHTTP:%{http_code}" 2>&1)
            STATUS=$(echo "$RESULT" | grep "HTTP:" | cut -d: -f2)
            BODY=$(echo "$RESULT" | grep -v "HTTP:")
            echo "  HTTP $STATUS: $BODY"
            if [ "$STATUS" = "200" ]; then
              SUCCESS=true
              echo "✓ Migration complete via $URL"
              echo "MIGRATED_VIA=$URL" >> "$GITHUB_ENV"
              break
            fi
            sleep 5
          done

          if [ "$SUCCESS" != "true" ]; then
            echo "✗ Migration failed on all URLs"
            exit 1
          fi

      - name: Health check
        run: |
          URLS=("$DEPLOY_URL" "https://hivebuystuff.hive.baby" "https://buy.hive.baby")
          for URL in "${URLS[@]}"; do
            echo "→ GET $URL/api/health"
            RESULT=$(curl -s "$URL/api/health" --max-time 15 2>&1)
            echo "  $RESULT"
          done
