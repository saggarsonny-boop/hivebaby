name: HiveBuyStuff — Run DB Migration

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/hivebuystuff-migrate.yml'

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Resolve Vercel token
        env:
          VERCEL_TOKEN_MAIN: ${{ secrets.VERCEL_TOKEN_MAIN }}
          VERCEL_TOKEN_FALLBACK: ${{ secrets.VERCEL_TOKEN }}
        run: |
          TOKEN="${VERCEL_TOKEN_MAIN:-$VERCEL_TOKEN_FALLBACK}"
          if [ -z "$TOKEN" ]; then echo "ERROR: No Vercel token"; exit 1; fi
          echo "VERCEL_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      - name: Resolve Vercel project and deployment URL
        run: |
          # Get project by name to find project ID
          PROJECT=$(curl -s "https://api.vercel.com/v9/projects/hive-hivebuystuff" \
            -H "Authorization: Bearer $VERCEL_TOKEN")
          PROJECT_ID=$(echo "$PROJECT" | jq -r '.id // empty')
          echo "Project ID: $PROJECT_ID"

          if [ -z "$PROJECT_ID" ]; then
            echo "ERROR: Could not find Vercel project hive-hivebuystuff"
            echo "Full response: $PROJECT"
            exit 1
          fi

          # Get latest production deployment
          DEPLOYMENTS=$(curl -s \
            "https://api.vercel.com/v6/deployments?projectId=$PROJECT_ID&limit=3&target=production" \
            -H "Authorization: Bearer $VERCEL_TOKEN")
          echo "Deployments: $(echo "$DEPLOYMENTS" | jq -c '[.deployments[]?.url] | .[0:3]')"

          DEPLOY_URL=$(echo "$DEPLOYMENTS" | jq -r '.deployments[0].url // empty')

          if [ -z "$DEPLOY_URL" ]; then
            # Try the project alias directly
            ALIAS=$(echo "$PROJECT" | jq -r '.alias[0].domain // empty')
            if [ -n "$ALIAS" ]; then
              DEPLOY_URL="$ALIAS"
              echo "Using project alias: $ALIAS"
            else
              echo "ERROR: Could not find deployment URL"
              echo "Project: $(echo "$PROJECT" | jq -c '{id,name,alias}')"
              exit 1
            fi
          fi

          echo "DEPLOY_URL=https://$DEPLOY_URL" >> "$GITHUB_ENV"
          echo "Using deployment URL: https://$DEPLOY_URL"

      - name: Run migration (via Vercel URL)
        run: |
          echo "→ POST $DEPLOY_URL/api/hbs/migrate"
          SUCCESS=false
          for attempt in 1 2 3 4 5 6; do
            RESULT=$(curl -s -X POST "$DEPLOY_URL/api/hbs/migrate" \
              --max-time 30 -w "\nHTTP:%{http_code}")
            STATUS=$(echo "$RESULT" | grep "HTTP:" | cut -d: -f2)
            BODY=$(echo "$RESULT" | grep -v "HTTP:")
            echo "  Attempt $attempt — HTTP $STATUS: $BODY"
            if [ "$STATUS" = "200" ]; then
              SUCCESS=true
              echo "✓ Migration complete"
              break
            fi
            sleep 10
          done
          if [ "$SUCCESS" != "true" ]; then
            echo "✗ Migration failed after 6 attempts"
            exit 1
          fi

      - name: Health check
        run: |
          echo "→ GET $DEPLOY_URL/api/health"
          RESULT=$(curl -s "$DEPLOY_URL/api/health" --max-time 15)
          echo "  $RESULT"
          STATUS=$(echo "$RESULT" | jq -r '.status // empty')
          ENGINE=$(echo "$RESULT" | jq -r '.engine // empty')
          if [ "$STATUS" = "ok" ] && [ "$ENGINE" = "HiveBuyStuff" ]; then
            echo "✓ HiveBuyStuff health check passed"
          else
            echo "⚠ Health check unexpected response"
          fi

          echo "→ GET https://hivebuystuff.hive.baby/api/health (custom domain DNS check)"
          CUSTOM=$(curl -s --max-time 10 "https://hivebuystuff.hive.baby/api/health" 2>&1 || echo "DNS not yet propagated")
          echo "  $CUSTOM"
