name: HivePhoto Reset Audit

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.github/workflows/hivephoto-reset-audit.yml']

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Find utilities project + fix ANTHROPIC_API_KEY
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          node << 'EOF' > /tmp/reset-audit.txt
          const VTOKEN = process.env.VERCEL_TOKEN;
          const AKEY   = process.env.ANTHROPIC_API_KEY;

          async function vapi(path, method = 'GET', body) {
            const res = await fetch(`https://api.vercel.com${path}`, {
              method,
              headers: { 'Authorization': `Bearer ${VTOKEN}`, 'Content-Type': 'application/json' },
              body: body ? JSON.stringify(body) : undefined,
            });
            return res.json();
          }

          async function checkAndFixProject(projId) {
            console.log(`\n=== ENV VARS for ${projId} ===`);
            const env = await vapi(`/v9/projects/${projId}/env`);
            if (env.error) { console.log('ERROR:', JSON.stringify(env.error)); return; }
            const vars = env.envs || [];
            console.log(`Total: ${vars.length}`);
            let anthropicVar = null;
            for (const v of vars) {
              const targets = (v.target || []).join(',');
              const display = v.type === 'encrypted' ? 'ENCRYPTED' : (v.value ? 'SET' : 'EMPTY');
              console.log(`  ${v.key} [${targets}] ${display}`);
              if (v.key === 'ANTHROPIC_API_KEY') anthropicVar = v;
            }

            console.log('\n=== ANTHROPIC_API_KEY STATUS ===');
            if (!anthropicVar) {
              console.log('MISSING — adding now');
              if (!AKEY) { console.log('ERROR: secret not available'); return; }
              const r = await vapi(`/v10/projects/${projId}/env`, 'POST', {
                key: 'ANTHROPIC_API_KEY', value: AKEY,
                type: 'encrypted', target: ['production', 'preview'],
              });
              console.log(r.error ? 'SET FAILED: ' + JSON.stringify(r.error) : `SET OK id=${r.id}`);
            } else {
              console.log(`PRESENT type=${anthropicVar.type} targets=${(anthropicVar.target||[]).join(',')}`);
            }
          }

          async function main() {
            // STEP 1: List all projects to find utilities
            console.log('=== ALL VERCEL PROJECTS ===');
            const all = await vapi('/v9/projects?limit=100');
            if (all.error) { console.log('ERROR:', JSON.stringify(all.error)); return; }
            const projects = all.projects || [];
            console.log(`Total projects: ${projects.length}`);

            let utilProject = null;
            for (const p of projects) {
              const aliases = (p.alias || []).map(a => a.value || a.domain || '').filter(Boolean);
              const hasUtils = aliases.some(a => a.includes('utilities'));
              console.log(`  ${p.name} (${p.id}) aliases=[${aliases.slice(0,3).join(', ')}]${hasUtils ? ' ← UTILITIES' : ''}`);
              if (hasUtils) utilProject = p;
            }

            if (!utilProject) {
              console.log('\nCould not find utilities project by alias. Trying by name patterns...');
              for (const p of projects) {
                if (p.name.includes('util') || p.name.includes('universal')) {
                  console.log(`  Candidate: ${p.name} (${p.id})`);
                  if (!utilProject) utilProject = p;
                }
              }
            }

            if (utilProject) {
              await checkAndFixProject(utilProject.id);
            } else {
              console.log('\nERROR: Could not identify utilities project');
            }
          }

          main().catch(e => { console.error('FATAL:', e.message); process.exit(1); });
          EOF

          cat /tmp/reset-audit.txt
          cp /tmp/reset-audit.txt hivephoto-reset-audit.txt

      - name: Commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "claude@hive.baby"
          git config user.name "Claude Code"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/saggarsonny-boop/hivebaby.git
          git add hivephoto-reset-audit.txt
          git commit -m "chore: utilities env audit $(date -u +%H:%M)" || echo "no changes"
          git push origin HEAD:main
