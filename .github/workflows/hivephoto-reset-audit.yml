name: HivePhoto Reset Audit

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.github/workflows/hivephoto-reset-audit.yml']

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Check and fix ud-utilities env vars
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          node << 'EOF' > /tmp/reset-audit.txt
          const VTOKEN = process.env.VERCEL_TOKEN;
          const AKEY   = process.env.ANTHROPIC_API_KEY;

          async function vapi(path, method = 'GET', body) {
            const res = await fetch(`https://api.vercel.com${path}`, {
              method,
              headers: {
                'Authorization': `Bearer ${VTOKEN}`,
                'Content-Type': 'application/json',
              },
              body: body ? JSON.stringify(body) : undefined,
            });
            return res.json();
          }

          async function main() {
            // STEP 1: List all env vars on ud-utilities
            console.log('=== STEP 1: ud-utilities ENV VARS ===');
            const env = await vapi('/v9/projects/ud-utilities/env');
            if (env.error) {
              console.log('ERROR:', JSON.stringify(env.error));
              // Try alternate project name
              console.log('Trying ud-utilities by slug...');
              const env2 = await vapi('/v9/projects/ud-utilities/env?teamId=');
              console.log(JSON.stringify(env2).slice(0, 500));
            } else {
              const vars = env.envs || [];
              console.log(`Total env vars: ${vars.length}`);
              let hasAnthropicKey = false;
              let anthropicValue = null;
              for (const v of vars) {
                const targets = (v.target || []).join(',');
                const hasValue = v.value ? 'POPULATED' : (v.type === 'encrypted' ? 'ENCRYPTED(hidden)' : 'EMPTY');
                console.log(`  ${v.key} [${targets}] = ${hasValue}`);
                if (v.key === 'ANTHROPIC_API_KEY') {
                  hasAnthropicKey = true;
                  anthropicValue = v;
                }
              }

              // STEP 2: Check ANTHROPIC_API_KEY
              console.log('\n=== STEP 2: ANTHROPIC_API_KEY STATUS ===');
              if (!hasAnthropicKey) {
                console.log('MISSING — not found in ud-utilities env vars');
                console.log('Setting ANTHROPIC_API_KEY on ud-utilities...');
                if (!AKEY) {
                  console.log('ERROR: ANTHROPIC_API_KEY not available in workflow secrets');
                } else {
                  const result = await vapi('/v10/projects/ud-utilities/env', 'POST', {
                    key: 'ANTHROPIC_API_KEY',
                    value: AKEY,
                    type: 'encrypted',
                    target: ['production', 'preview'],
                  });
                  if (result.error) {
                    console.log('SET ERROR:', JSON.stringify(result.error));
                  } else {
                    console.log('SET OK — id:', result.id, 'key:', result.key);
                  }
                }
              } else {
                console.log('PRESENT — id:', anthropicValue.id, 'type:', anthropicValue.type, 'targets:', (anthropicValue.target || []).join(','));
                // Check if it's encrypted/populated
                if (anthropicValue.type === 'encrypted') {
                  console.log('Value: encrypted (cannot read back — treat as set)');
                } else if (!anthropicValue.value) {
                  console.log('WARNING: value appears empty — patching...');
                  if (AKEY) {
                    const patch = await vapi(`/v9/projects/ud-utilities/env/${anthropicValue.id}`, 'PATCH', {
                      value: AKEY,
                      target: ['production', 'preview'],
                    });
                    console.log('PATCH result:', patch.error ? JSON.stringify(patch.error) : 'OK');
                  }
                }
              }

              // STEP 3: Trigger redeploy of ud-utilities to pick up new env
              console.log('\n=== STEP 3: TRIGGER REDEPLOY ===');
              const deps = await vapi('/v6/deployments?projectId=ud-utilities&limit=1');
              const latest = (deps.deployments || [])[0];
              if (latest) {
                console.log(`Latest deployment: ${latest.uid} state=${latest.state}`);
                // Only redeploy if ANTHROPIC_API_KEY was missing
                if (!hasAnthropicKey && AKEY) {
                  const redeploy = await vapi(`/v13/deployments?forceNew=1`, 'POST', {
                    name: 'ud-utilities',
                    deploymentId: latest.uid,
                    target: 'production',
                  });
                  if (redeploy.error) {
                    console.log('REDEPLOY ERROR:', JSON.stringify(redeploy.error).slice(0, 200));
                  } else {
                    console.log('REDEPLOY triggered:', redeploy.id || redeploy.uid || 'ok');
                  }
                } else {
                  console.log('(no redeploy needed — key was already present or no change made)');
                }
              }
            }
          }

          main().catch(e => { console.error('FATAL:', e.message); process.exit(1); });
          EOF

          cat /tmp/reset-audit.txt
          cp /tmp/reset-audit.txt hivephoto-reset-audit.txt

      - name: Commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "claude@hive.baby"
          git config user.name "Claude Code"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/saggarsonny-boop/hivebaby.git
          git add hivephoto-reset-audit.txt
          git commit -m "chore: ud-utilities env audit $(date -u +%H:%M)" || echo "no changes"
          git push origin HEAD:main
