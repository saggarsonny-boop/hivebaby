name: HivePhoto Reset Audit

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.github/workflows/hivephoto-reset-audit.yml']

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Find utilities project and fix ANTHROPIC_API_KEY
        env:
          VERCEL_TOKEN_MAIN: ${{ secrets.VERCEL_TOKEN_MAIN }}
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
        run: |
          node << 'EOF' > /tmp/reset-audit.txt
          const VTOKEN = process.env.VERCEL_TOKEN_MAIN;
          const AKEY   = process.env.ANTHROPIC_KEY;

          async function vget(path) {
            const r = await fetch(`https://api.vercel.com${path}`, {
              headers: { 'Authorization': `Bearer ${VTOKEN}` },
            });
            return r.json();
          }
          async function vpatch(path, body) {
            const r = await fetch(`https://api.vercel.com${path}`, {
              method: 'PATCH',
              headers: { 'Authorization': `Bearer ${VTOKEN}`, 'Content-Type': 'application/json' },
              body: JSON.stringify(body),
            });
            return r.json();
          }
          async function vpost(path, body) {
            const r = await fetch(`https://api.vercel.com${path}`, {
              method: 'POST',
              headers: { 'Authorization': `Bearer ${VTOKEN}`, 'Content-Type': 'application/json' },
              body: JSON.stringify(body),
            });
            return r.json();
          }

          async function listProjects(teamParam) {
            const label = teamParam || 'personal';
            const qs = teamParam ? `&teamId=${teamParam}` : '';
            const all = await vget(`/v9/projects?limit=100${qs}`);
            if (all.error) { console.log(`  ${label}: ERROR ${all.error.code} — ${all.error.message}`); return []; }
            const projects = all.projects || [];
            console.log(`  ${label}: ${projects.length} projects`);
            for (const p of projects) {
              const aliases = (p.alias || []).map(a => a.value || a.domain || '').filter(Boolean);
              const isUtil = aliases.some(a => a.includes('utilities'));
              console.log(`    ${p.name} (${p.id}) [${aliases.slice(0,3).join(', ')}]${isUtil ? ' ← UTILITIES' : ''}`);
            }
            return projects;
          }

          async function fixApiKey(projId, teamParam) {
            const qs = teamParam ? `?teamId=${teamParam}` : '';
            console.log(`\n=== ENV VARS on ${projId} ===`);
            const env = await vget(`/v9/projects/${projId}/env${qs}`);
            if (env.error) { console.log('ERROR:', JSON.stringify(env.error)); return; }
            const vars = env.envs || [];
            let anthropicVar = null;
            for (const v of vars) {
              const display = v.type === 'encrypted' ? 'ENCRYPTED' : (v.value ? 'SET' : 'EMPTY');
              console.log(`  ${v.key} [${(v.target||[]).join(',')}] ${display}`);
              if (v.key === 'ANTHROPIC_API_KEY') anthropicVar = v;
            }
            console.log('\n=== ANTHROPIC_API_KEY ===');
            if (!AKEY) { console.log('ERROR: ANTHROPIC_KEY secret not in workflow'); return; }
            if (!anthropicVar) {
              console.log('MISSING — adding');
              const r = await vpost(`/v10/projects/${projId}/env${qs}`, {
                key: 'ANTHROPIC_API_KEY', value: AKEY,
                type: 'encrypted', target: ['production', 'preview'],
              });
              console.log(r.error ? 'FAILED: ' + JSON.stringify(r.error) : `ADDED id=${r.id}`);
            } else {
              console.log(`EXISTS id=${anthropicVar.id} — patching value`);
              const r = await vpatch(`/v9/projects/${projId}/env/${anthropicVar.id}${qs}`, {
                value: AKEY, target: ['production', 'preview'],
              });
              console.log(r.error ? 'PATCH FAILED: ' + JSON.stringify(r.error) : `PATCHED OK`);
            }
            // Trigger redeploy
            console.log('\n=== REDEPLOY ===');
            const deps = await vget(`/v6/deployments?projectId=${projId}&limit=1${qs ? '&' + qs.slice(1) : ''}`);
            const latest = (deps.deployments || [])[0];
            if (latest) {
              console.log(`Latest: ${latest.uid} state=${latest.state}`);
              const rd = await vpost(`/v13/deployments?forceNew=1${qs ? '&' + qs.slice(1) : ''}`, {
                deploymentId: latest.uid, name: latest.name || projId, target: 'production',
              });
              console.log(rd.error ? 'REDEPLOY ERROR: ' + JSON.stringify(rd.error).slice(0,200) : `REDEPLOYING: ${rd.id || rd.uid || 'ok'}`);
            }
          }

          async function main() {
            console.log('=== STEP 1: LIST TEAMS ===');
            const teams = await vget('/v2/teams?limit=20');
            const teamList = teams.teams || [];
            console.log(`Teams: ${teamList.map(t => `${t.name}(${t.id})`).join(', ') || 'none'}`);

            console.log('\n=== STEP 2: ALL PROJECTS ===');
            let allProjects = [];
            let foundTeam = null;

            // Personal
            const personal = await listProjects(null);
            for (const p of personal) {
              const aliases = (p.alias || []).map(a => a.value || a.domain || '');
              if (aliases.some(a => a.includes('utilities'))) { foundTeam = null; }
              allProjects.push({ project: p, teamParam: null });
            }

            // Each team
            for (const team of teamList) {
              const teamProjs = await listProjects(team.id);
              for (const p of teamProjs) {
                const aliases = (p.alias || []).map(a => a.value || a.domain || '');
                if (aliases.some(a => a.includes('utilities'))) { foundTeam = team.id; }
                allProjects.push({ project: p, teamParam: team.id });
              }
            }

            // Find utilities by alias or name
            const utilEntry = allProjects.find(e => {
              const aliases = (e.project.alias || []).map(a => a.value || a.domain || '');
              return aliases.some(a => a.includes('utilities')) || e.project.name.includes('util');
            });

            if (utilEntry) {
              console.log(`\n=== FOUND: ${utilEntry.project.name} (${utilEntry.project.id}) ===`);
              await fixApiKey(utilEntry.project.id, utilEntry.teamParam);
            } else {
              console.log('\n=== utilities not found by alias — listing all project names for manual check ===');
              for (const e of allProjects) {
                console.log(`  ${e.project.name} (${e.project.id})`);
              }
            }
          }

          main().catch(e => { console.error('FATAL:', e.message); process.exit(1); });
          EOF

          cat /tmp/reset-audit.txt
          cp /tmp/reset-audit.txt hivephoto-reset-audit.txt

      - name: Commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "claude@hive.baby"
          git config user.name "Claude Code"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/saggarsonny-boop/hivebaby.git
          git add hivephoto-reset-audit.txt
          git commit -m "chore: utilities ANTHROPIC_API_KEY fix $(date -u +%H:%M)" || echo "no changes"
          git push origin HEAD:main
