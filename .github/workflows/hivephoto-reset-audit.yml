name: HivePhoto Reset Audit

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.github/workflows/hivephoto-reset-audit.yml']

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Audit + fix node version
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node << 'EOF' > /tmp/reset-audit.txt
          const VTOKEN = process.env.VERCEL_TOKEN;
          const GTOKEN = process.env.GITHUB_TOKEN;
          const LATEST_FAIL_ID = 'D55C1xV4aPWjG3RGArwh1T5pRrNP';

          async function main() {
            // TASK 1: Read vercel.json from hive-hivephoto
            console.log('=== TASK 1: vercel.json ===');
            const vjRes = await fetch(
              'https://api.github.com/repos/saggarsonny-boop/hive-hivephoto/contents/vercel.json',
              { headers: { 'Authorization': `Bearer ${GTOKEN}`, 'Accept': 'application/vnd.github.v3+json' } }
            );
            const vjData = await vjRes.json();
            if (vjData.content) {
              console.log(Buffer.from(vjData.content, 'base64').toString());
            } else {
              console.log('ERROR:', JSON.stringify(vjData).slice(0, 300));
            }

            // TASK 2: Build log for latest failure D55C1xV4a
            console.log('\n=== TASK 2: BUILD LOG (D55C1xV4a) ===');
            const evRes = await fetch(
              `https://api.vercel.com/v2/deployments/${LATEST_FAIL_ID}/events?limit=100`,
              { headers: { 'Authorization': `Bearer ${VTOKEN}` } }
            );
            const evText = await evRes.text();
            let lineCount = 0;
            for (const line of evText.split('\n')) {
              if (!line.trim()) continue;
              try {
                const e = JSON.parse(line);
                const p = e.payload || '';
                const text = typeof p === 'string' ? p
                  : (p.text || p.message || JSON.stringify(p));
                if (text && text.trim()) {
                  console.log(text.slice(0, 300));
                  lineCount++;
                }
              } catch { if (line.length > 2) console.log(line); }
            }
            if (lineCount === 0) console.log('(no events returned)');

            // TASK 3: Change nodeVersion to 20.x
            console.log('\n=== TASK 3: SET nodeVersion 20.x ===');
            const patchRes = await fetch(
              'https://api.vercel.com/v9/projects/hive-hivephoto',
              {
                method: 'PATCH',
                headers: {
                  'Authorization': `Bearer ${VTOKEN}`,
                  'Content-Type': 'application/json',
                },
                body: JSON.stringify({ nodeVersion: '20.x' }),
              }
            );
            const patchData = await patchRes.json();
            if (patchData.error) {
              console.log('PATCH ERROR:', JSON.stringify(patchData.error));
            } else {
              console.log('nodeVersion now:', patchData.nodeVersion);
              console.log('name:', patchData.name);
              console.log('id:', patchData.id);
            }
          }

          main().catch(e => { console.error('FATAL:', e.message); process.exit(1); });
          EOF

          cat /tmp/reset-audit.txt
          cp /tmp/reset-audit.txt hivephoto-reset-audit.txt

      - name: Commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "claude@hive.baby"
          git config user.name "Claude Code"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/saggarsonny-boop/hivebaby.git
          git add hivephoto-reset-audit.txt
          git commit -m "chore: hivephoto audit + node 20.x fix $(date -u +%H:%M)" || echo "no changes"
          git push origin HEAD:main
