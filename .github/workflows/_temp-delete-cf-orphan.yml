name: _temp Delete Orphan CF Token
on:
  workflow_dispatch:

jobs:
  delete-orphan-token:
    runs-on: ubuntu-latest
    steps:
      - name: Delete orphan CF token 5d3e0c4643e099824af3cb28cbed6d70
        run: |
          RESPONSE=$(curl -s -X DELETE \
            "https://api.cloudflare.com/client/v4/user/tokens/5d3e0c4643e099824af3cb28cbed6d70" \
            -H "X-Auth-Email: ${{ secrets.CF_EMAIL }}" \
            -H "X-Auth-Key: ${{ secrets.CF_GLOBAL_KEY }}" \
            -H "Content-Type: application/json")

          SUCCESS=$(echo "$RESPONSE" | jq -r '.success')
          ERRORS=$(echo "$RESPONSE" | jq -r '.errors')

          echo "success: $SUCCESS"
          echo "errors: $ERRORS"

          if [ "$SUCCESS" != "true" ]; then
            echo "ERROR: CF API returned success=false"
            exit 1
          fi

          echo "Orphan token deleted successfully."
