name: Cloudflare — Mint scoped token & emit encrypted CF_TOKEN blob

on:
  workflow_dispatch:
    inputs:
      gh_pub_key:
        description: 'GitHub repo libsodium public key (base64). Pass via dispatch.'
        required: true
      gh_key_id:
        description: 'GitHub repo libsodium public-key id. Pass via dispatch.'
        required: true

permissions:
  contents: read

jobs:
  mint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      encrypted_value: ${{ steps.mint.outputs.encrypted_value }}
      key_id:          ${{ steps.mint.outputs.key_id }}
      new_token_id:    ${{ steps.mint.outputs.new_token_id }}
    steps:
      - id: mint
        name: Mint CF API token and emit encrypted blob
        env:
          CF_GLOBAL_KEY: ${{ secrets.CF_GLOBAL_KEY }}
          CF_EMAIL:      ${{ secrets.CF_EMAIL }}
          CF_ZONE:       ${{ secrets.CF_ZONE }}
          PUB_KEY:       ${{ inputs.gh_pub_key }}
          KEY_ID:        ${{ inputs.gh_key_id }}
        run: |
          set -uo pipefail

          die() { echo "::error::$1"; exit 1; }

          [ -n "${CF_GLOBAL_KEY:-}" ] || die "CF_GLOBAL_KEY secret missing"
          [ -n "${CF_EMAIL:-}" ]      || die "CF_EMAIL secret missing"
          [ -n "${CF_ZONE:-}" ]       || die "CF_ZONE secret missing"
          [ -n "${PUB_KEY:-}" ]       || die "gh_pub_key input missing"
          [ -n "${KEY_ID:-}" ]        || die "gh_key_id input missing"

          # ---- 1. Look up DNS:Write + Zone:Read permission group IDs.
          echo "===== 1. Fetching permission groups ====="
          PERMS=$(curl -s \
            -H "X-Auth-Email: $CF_EMAIL" \
            -H "X-Auth-Key: $CF_GLOBAL_KEY" \
            -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/user/tokens/permission_groups")

          PERMS_OK=$(echo "$PERMS" | jq -r '.success // false')
          if [ "$PERMS_OK" != "true" ]; then
            echo "Permission group fetch failed:"
            echo "$PERMS" | jq '{success, errors}'
            die "Cloudflare did not accept the Global API Key for permission_groups."
          fi

          DNS_EDIT_ID=$(echo "$PERMS"  | jq -r '.result[] | select(.name=="DNS Write") | .id' | head -1)
          ZONE_READ_ID=$(echo "$PERMS" | jq -r '.result[] | select(.name=="Zone Read") | .id' | head -1)

          if [ -z "$DNS_EDIT_ID" ] || [ -z "$ZONE_READ_ID" ]; then
            echo "Available zone-scoped permission groups (for debugging):"
            echo "$PERMS" | jq '.result[] | select((.scopes // []) | any(. | tostring | contains("zone"))) | {id, name}'
            die "Could not resolve DNS Write or Zone Read permission group ID."
          fi
          echo "DNS Write group:  $DNS_EDIT_ID"
          echo "Zone Read group:  $ZONE_READ_ID"

          # ---- 2. Mint the new token, scoped to hive.baby only.
          echo
          echo "===== 2. Minting new API token ====="
          PAYLOAD=$(jq -n \
            --arg dnsId  "$DNS_EDIT_ID" \
            --arg zoneId "$ZONE_READ_ID" \
            --arg zone   "$CF_ZONE" \
            --arg name   "hive.baby DNS Edit (auto-minted by cf-mint-and-rotate-token)" \
            '{
              name: $name,
              policies: [
                {
                  effect: "allow",
                  resources: { ("com.cloudflare.api.account.zone." + $zone): "*" },
                  permission_groups: [ {id: $dnsId}, {id: $zoneId} ]
                }
              ]
            }')

          MINT_RESP=$(curl -s -X POST \
            -H "X-Auth-Email: $CF_EMAIL" \
            -H "X-Auth-Key: $CF_GLOBAL_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://api.cloudflare.com/client/v4/user/tokens")

          MINT_OK=$(echo "$MINT_RESP" | jq -r '.success // false')
          if [ "$MINT_OK" != "true" ]; then
            echo "Mint failed:"
            echo "$MINT_RESP" | jq '{success, errors, messages}'
            die "POST /user/tokens did not succeed."
          fi

          NEW_TOKEN=$(echo "$MINT_RESP" | jq -r '.result.value')
          # CRITICAL: mask the token value before any subsequent line could leak it.
          echo "::add-mask::$NEW_TOKEN"
          NEW_TOKEN_ID=$(echo "$MINT_RESP" | jq -r '.result.id')
          NEW_TOKEN_STATUS=$(echo "$MINT_RESP" | jq -r '.result.status')
          echo "New token ID:     $NEW_TOKEN_ID"
          echo "New token status: $NEW_TOKEN_STATUS"
          echo "New token policy: Zone:DNS:Edit + Zone:Read, scoped to hive.baby only"

          # Sanity: re-verify the new token via /user/tokens/verify (ID-only output).
          VERIFY=$(curl -s \
            -H "Authorization: Bearer $NEW_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/user/tokens/verify")
          VERIFY_ID=$(echo "$VERIFY" | jq -r '.result.id // empty')
          VERIFY_STATUS=$(echo "$VERIFY" | jq -r '.result.status // empty')
          [ "$VERIFY_ID" = "$NEW_TOKEN_ID" ] || die "Verify call did not return matching ID"
          echo "Verify result:    id=$VERIFY_ID status=$VERIFY_STATUS"

          # ---- 3. Seal the token with the supplied libsodium public key.
          # The encrypted blob is opaque to anyone but GitHub — safe to expose as a job output.
          echo
          echo "===== 3. Sealing token with libsodium ====="
          pip install --quiet pynacl >/dev/null 2>&1 || die "pip install pynacl failed"

          ENCRYPTED=$(NEW_TOKEN="$NEW_TOKEN" PUB_KEY="$PUB_KEY" python3 -c '
          import base64, os
          from nacl import encoding, public
          pk = public.PublicKey(os.environ["PUB_KEY"].encode("utf-8"), encoding.Base64Encoder())
          sealed = public.SealedBox(pk).encrypt(os.environ["NEW_TOKEN"].encode("utf-8"))
          print(base64.b64encode(sealed).decode("utf-8"))
          ')
          [ -n "$ENCRYPTED" ] || die "Encryption produced empty result"
          echo "Token sealed (ciphertext length=${#ENCRYPTED})"

          # ---- 4. Emit job outputs AND print the blob plainly to logs.
          # Step outputs aren't exposed via the REST API for external pickup,
          # so we also echo the opaque ciphertext between sentinel lines for
          # the local caller to grep. The blob is encrypted with GitHub's
          # repo public key — only GitHub can decrypt it; safe to log.
          {
            echo "encrypted_value=$ENCRYPTED"
            echo "key_id=$KEY_ID"
            echo "new_token_id=$NEW_TOKEN_ID"
          } >> "$GITHUB_OUTPUT"

          echo
          echo "===== Done ====="
          echo "New token ID: $NEW_TOKEN_ID  (Zone:DNS:Edit + Zone:Read on hive.baby)"
          echo
          echo "----BEGIN-ENCRYPTED-BLOB----"
          echo "$ENCRYPTED"
          echo "----END-ENCRYPTED-BLOB----"
          echo "----KEY-ID----"
          echo "$KEY_ID"
          echo "----END-KEY-ID----"
