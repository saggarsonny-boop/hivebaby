name: Ops — Set DATABASE_URL on landing and ud-signer

on:
  workflow_dispatch:
  push:
    branches:
      - claude/hive-integrity-audit-pQacd
    paths:
      - '.github/workflows/ops-set-env.yml'

jobs:
  set-env:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN_MAIN || secrets.VERCEL_TOKEN }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      LANDING_PROJECT: prj_iraVc9HNzaNyFv14gnn0tWMO6oVk
      SIGNER_PROJECT: prj_aHr0Al8la5rpFajSnBs7WM0AfSEJ

    steps:
      - name: Check secrets
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "ERROR: VERCEL_TOKEN_MAIN and VERCEL_TOKEN are both unset in repo secrets"
            exit 1
          fi
          if [ -z "$DATABASE_URL" ]; then
            echo "ERROR: DATABASE_URL is not set in repo secrets"
            exit 1
          fi
          echo "✓ Secrets present (VERCEL_TOKEN length=${#VERCEL_TOKEN}, DATABASE_URL length=${#DATABASE_URL})"

      - name: Set DATABASE_URL on landing project
        run: |
          echo "→ Setting DATABASE_URL on landing ($LANDING_PROJECT)"
          STATUS=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
            -X POST "https://api.vercel.com/v9/projects/$LANDING_PROJECT/env" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"key\":\"DATABASE_URL\",\"value\":$(echo "$DATABASE_URL" | jq -Rs .),\"type\":\"encrypted\",\"target\":[\"production\",\"preview\"]}")
          cat /tmp/resp.json | jq -c '{status: .key, err: .error}' 2>/dev/null || cat /tmp/resp.json
          if [ "$STATUS" = "409" ]; then
            echo "  Already exists — finding env ID to update"
            ENV_ID=$(curl -s "https://api.vercel.com/v9/projects/$LANDING_PROJECT/env" \
              -H "Authorization: Bearer $VERCEL_TOKEN" | jq -r '.envs[]? | select(.key=="DATABASE_URL") | .id' | head -1)
            echo "  Env ID: $ENV_ID"
            if [ -n "$ENV_ID" ]; then
              curl -s -X PATCH "https://api.vercel.com/v9/projects/$LANDING_PROJECT/env/$ENV_ID" \
                -H "Authorization: Bearer $VERCEL_TOKEN" \
                -H "Content-Type: application/json" \
                -d "{\"value\":$(echo "$DATABASE_URL" | jq -Rs .),\"target\":[\"production\",\"preview\"]}" | jq -c '{key}'
              echo "  ✓ Updated"
            fi
          elif [ "$STATUS" = "200" ] || [ "$STATUS" = "201" ]; then
            echo "  ✓ Created (HTTP $STATUS)"
          else
            echo "  ✗ Unexpected HTTP $STATUS"
            exit 1
          fi

      - name: Set DATABASE_URL on ud-signer project
        run: |
          echo "→ Setting DATABASE_URL on ud-signer ($SIGNER_PROJECT)"
          STATUS=$(curl -s -o /tmp/resp2.json -w "%{http_code}" \
            -X POST "https://api.vercel.com/v9/projects/$SIGNER_PROJECT/env" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"key\":\"DATABASE_URL\",\"value\":$(echo "$DATABASE_URL" | jq -Rs .),\"type\":\"encrypted\",\"target\":[\"production\",\"preview\"]}")
          cat /tmp/resp2.json | jq -c '{status: .key, err: .error}' 2>/dev/null || cat /tmp/resp2.json
          if [ "$STATUS" = "409" ]; then
            echo "  Already exists — finding env ID to update"
            ENV_ID=$(curl -s "https://api.vercel.com/v9/projects/$SIGNER_PROJECT/env" \
              -H "Authorization: Bearer $VERCEL_TOKEN" | jq -r '.envs[]? | select(.key=="DATABASE_URL") | .id' | head -1)
            if [ -n "$ENV_ID" ]; then
              curl -s -X PATCH "https://api.vercel.com/v9/projects/$SIGNER_PROJECT/env/$ENV_ID" \
                -H "Authorization: Bearer $VERCEL_TOKEN" \
                -H "Content-Type: application/json" \
                -d "{\"value\":$(echo "$DATABASE_URL" | jq -Rs .),\"target\":[\"production\",\"preview\"]}" | jq -c '{key}'
              echo "  ✓ Updated"
            fi
          elif [ "$STATUS" = "200" ] || [ "$STATUS" = "201" ]; then
            echo "  ✓ Created (HTTP $STATUS)"
          else
            echo "  ✗ Unexpected HTTP $STATUS"
            exit 1
          fi

      - name: Redeploy landing (ud.hive.baby)
        run: |
          echo "→ Triggering redeploy of landing"
          LATEST=$(curl -s "https://api.vercel.com/v6/deployments?projectId=$LANDING_PROJECT&limit=1&target=production" \
            -H "Authorization: Bearer $VERCEL_TOKEN" | jq -r '.deployments[0].uid // empty')
          if [ -z "$LATEST" ]; then
            echo "  ⚠ No production deployment found — skipping redeploy"
            exit 0
          fi
          DEP_NAME=$(curl -s "https://api.vercel.com/v6/deployments?projectId=$LANDING_PROJECT&limit=1&target=production" \
            -H "Authorization: Bearer $VERCEL_TOKEN" | jq -r '.deployments[0].name')
          echo "  Latest deployment: $LATEST (name: $DEP_NAME)"
          RESULT=$(curl -s -X POST "https://api.vercel.com/v13/deployments" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"$DEP_NAME\",\"deploymentId\":\"$LATEST\",\"target\":\"production\"}")
          echo "  $RESULT" | jq -c '{id, url, readyState}' 2>/dev/null || echo "  $RESULT"
          echo "  ✓ Redeploy triggered"

      - name: Wait and verify seed-demos
        run: |
          echo "→ Waiting 90s for landing to redeploy..."
          sleep 90
          for i in 1 2 3 4 5; do
            echo "  Attempt $i: curl https://ud.hive.baby/api/seed-demos"
            RESULT=$(curl -s "https://ud.hive.baby/api/seed-demos")
            echo "  Response: $RESULT"
            OK=$(echo "$RESULT" | jq -r '.ok // false' 2>/dev/null)
            if [ "$OK" = "true" ]; then
              echo "  ✓ seed-demos returned ok:true"
              exit 0
            fi
            if [ $i -lt 5 ]; then sleep 15; fi
          done
          echo "  ✗ seed-demos did not return ok:true after 5 attempts"
          exit 1
