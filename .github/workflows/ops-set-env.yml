name: Ops — Set DATABASE_URL on landing and ud-signer

on:
  workflow_dispatch:

jobs:
  set-env:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check secrets and resolve token
        env:
          VERCEL_TOKEN_MAIN: ${{ secrets.VERCEL_TOKEN_MAIN }}
          VERCEL_TOKEN_FALLBACK: ${{ secrets.VERCEL_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          TOKEN="${VERCEL_TOKEN_MAIN:-$VERCEL_TOKEN_FALLBACK}"
          echo "VERCEL_TOKEN_MAIN length: ${#VERCEL_TOKEN_MAIN}"
          echo "VERCEL_TOKEN_FALLBACK length: ${#VERCEL_TOKEN_FALLBACK}"
          echo "DATABASE_URL length: ${#DATABASE_URL}"
          if [ -z "$TOKEN" ]; then
            echo "ERROR: Both VERCEL_TOKEN_MAIN and VERCEL_TOKEN are empty"
            exit 1
          fi
          if [ -z "$DATABASE_URL" ]; then
            echo "ERROR: DATABASE_URL is empty"
            exit 1
          fi
          echo "✓ Token resolved (length=${#TOKEN}), DATABASE_URL present"
          echo "VERCEL_TOKEN=$TOKEN" >> "$GITHUB_ENV"
          echo "DATABASE_URL=$DATABASE_URL" >> "$GITHUB_ENV"

      - name: Set DATABASE_URL on landing (prj_iraVc9HNzaNyFv14gnn0tWMO6oVk)
        run: |
          set_env_var() {
            local PROJECT="$1"
            echo "→ POST /v9/projects/$PROJECT/env"
            STATUS=$(curl -s -o /tmp/vercel_resp.json -w "%{http_code}" \
              -X POST "https://api.vercel.com/v9/projects/$PROJECT/env" \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"key\":\"DATABASE_URL\",\"value\":$(echo "$DATABASE_URL" | jq -Rs .),\"type\":\"encrypted\",\"target\":[\"production\",\"preview\"]}")
            BODY=$(cat /tmp/vercel_resp.json)
            echo "  HTTP $STATUS: $BODY"
            if [ "$STATUS" = "409" ]; then
              echo "  Already exists — patching"
              ENV_ID=$(echo "$BODY" | jq -r '.error.envVarId // empty' 2>/dev/null)
              if [ -z "$ENV_ID" ]; then
                ENV_ID=$(curl -s "https://api.vercel.com/v9/projects/$PROJECT/env" \
                  -H "Authorization: Bearer $VERCEL_TOKEN" \
                  | jq -r '.envs[]? | select(.key=="DATABASE_URL") | .id' | head -1)
              fi
              echo "  Env ID: $ENV_ID"
              if [ -n "$ENV_ID" ]; then
                PATCH=$(curl -s -w "\n%{http_code}" \
                  -X PATCH "https://api.vercel.com/v9/projects/$PROJECT/env/$ENV_ID" \
                  -H "Authorization: Bearer $VERCEL_TOKEN" \
                  -H "Content-Type: application/json" \
                  -d "{\"value\":$(echo "$DATABASE_URL" | jq -Rs .),\"target\":[\"production\",\"preview\"]}")
                echo "  PATCH: $PATCH"
                echo "  ✓ Updated"
              else
                echo "  ⚠ Could not find env ID to patch"
              fi
            elif [ "$STATUS" = "200" ] || [ "$STATUS" = "201" ]; then
              echo "  ✓ Created (HTTP $STATUS)"
            else
              echo "  ⚠ Unexpected HTTP $STATUS — logged above, continuing"
            fi
          }
          set_env_var "prj_iraVc9HNzaNyFv14gnn0tWMO6oVk"

      - name: Set DATABASE_URL on ud-signer (prj_aHr0Al8la5rpFajSnBs7WM0AfSEJ / ud-signer)
        run: |
          set_env_var() {
            local PROJECT="$1"
            echo "→ POST /v9/projects/$PROJECT/env"
            STATUS=$(curl -s -o /tmp/vercel_resp.json -w "%{http_code}" \
              -X POST "https://api.vercel.com/v9/projects/$PROJECT/env" \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"key\":\"DATABASE_URL\",\"value\":$(echo "$DATABASE_URL" | jq -Rs .),\"type\":\"encrypted\",\"target\":[\"production\",\"preview\"]}")
            BODY=$(cat /tmp/vercel_resp.json)
            echo "  HTTP $STATUS: $BODY"
            if [ "$STATUS" = "409" ]; then
              echo "  Already exists — patching"
              ENV_ID=$(echo "$BODY" | jq -r '.error.envVarId // empty' 2>/dev/null)
              if [ -z "$ENV_ID" ]; then
                ENV_ID=$(curl -s "https://api.vercel.com/v9/projects/$PROJECT/env" \
                  -H "Authorization: Bearer $VERCEL_TOKEN" \
                  | jq -r '.envs[]? | select(.key=="DATABASE_URL") | .id' | head -1)
              fi
              echo "  Env ID: $ENV_ID"
              if [ -n "$ENV_ID" ]; then
                PATCH=$(curl -s -w "\n%{http_code}" \
                  -X PATCH "https://api.vercel.com/v9/projects/$PROJECT/env/$ENV_ID" \
                  -H "Authorization: Bearer $VERCEL_TOKEN" \
                  -H "Content-Type: application/json" \
                  -d "{\"value\":$(echo "$DATABASE_URL" | jq -Rs .),\"target\":[\"production\",\"preview\"]}")
                echo "  PATCH: $PATCH"
                echo "  ✓ Updated"
              else
                echo "  ⚠ Could not find env ID to patch"
              fi
            elif [ "$STATUS" = "200" ] || [ "$STATUS" = "201" ]; then
              echo "  ✓ Created (HTTP $STATUS)"
            else
              echo "  ⚠ Unexpected HTTP $STATUS — logged above, continuing"
            fi
          }
          # Try by project ID first, then by project name
          set_env_var "prj_aHr0Al8la5rpFajSnBs7WM0AfSEJ"
          echo "--- also trying by name 'ud-signer' ---"
          set_env_var "ud-signer"

      - name: Redeploy landing (ud.hive.baby)
        run: |
          echo "→ Triggering redeploy of landing"
          PAYLOAD=$(curl -s "https://api.vercel.com/v6/deployments?projectId=prj_iraVc9HNzaNyFv14gnn0tWMO6oVk&limit=1&target=production" \
            -H "Authorization: Bearer $VERCEL_TOKEN")
          echo "  Latest deployment: $(echo "$PAYLOAD" | jq -c '.deployments[0] | {uid,name,state}')"
          LATEST=$(echo "$PAYLOAD" | jq -r '.deployments[0].uid // empty')
          DEP_NAME=$(echo "$PAYLOAD" | jq -r '.deployments[0].name // empty')
          if [ -z "$LATEST" ]; then
            echo "  ⚠ No production deployment found — skipping redeploy"
          else
            RESULT=$(curl -s -X POST "https://api.vercel.com/v13/deployments" \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"name\":\"$DEP_NAME\",\"deploymentId\":\"$LATEST\",\"target\":\"production\"}")
            echo "  Redeploy response: $(echo "$RESULT" | jq -c '{id,readyState,url}' 2>/dev/null || echo "$RESULT")"
            echo "  ✓ Redeploy triggered"
          fi

      - name: Wait and verify seed-demos
        run: |
          echo "→ Waiting 90s for landing to redeploy..."
          sleep 90
          for i in 1 2 3 4 5; do
            RESULT=$(curl -s "https://ud.hive.baby/api/seed-demos")
            echo "  Attempt $i: $RESULT"
            if [ "$(echo "$RESULT" | jq -r '.ok // false' 2>/dev/null)" = "true" ]; then
              echo "  ✓ seed-demos ok:true — all done"
              exit 0
            fi
            [ $i -lt 5 ] && sleep 15
          done
          echo "  ✗ seed-demos did not return ok:true after 5 attempts"
          exit 1
