name: Health Check — All Hive Properties

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'

permissions:
  issues: write

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check all URLs
        run: |
          > /tmp/failures.txt

          check_url() {
            local NAME="$1"
            local URL="$2"
            local RESP
            RESP=$(curl -s -o /tmp/resp_body.txt -w "%{http_code}" \
              --max-time 20 -L --retry 1 "$URL" 2>/dev/null)
            local BODY
            BODY=$(head -c 200 /tmp/resp_body.txt | tr -d '\000' | head -c 120)
            if [ "$RESP" = "200" ]; then
              echo "::notice::OK   $NAME → $RESP"
            else
              echo "::warning::FAIL $NAME → $RESP"
              printf "### %s\n- URL: %s\n- Status: HTTP %s\n- Body: \`%s\`\n\n" \
                "$NAME" "$URL" "$RESP" "$BODY" >> /tmp/failures.txt
            fi
          }

          # ── Core ─────────────────────────────────────────────────────────────────────
          check_url "hive.baby"              "https://hive.baby"
          check_url "HivePhoto"              "https://hivephoto.hive.baby"
          check_url "HiveTestingStation"     "https://test.hive.baby"
          check_url "HiveMoon"               "https://hivemoon.hive.baby"
          check_url "HiveField"              "https://hivefield.hive.baby"
          check_url "HiveClock"              "https://hiveclock.hive.baby"
          check_url "HiveClarity"            "https://hiveclarity.hive.baby"
          check_url "HiveStrength"           "https://hivestrength.hive.baby"
          check_url "HiveBodyLog"            "https://hivebodylog.hive.baby"
          check_url "HiveCreatorConsole"     "https://creatorconsole.hive.baby"
          check_url "HiveSecretBox"          "https://secretbox.hive.baby"
          check_url "WhoTextedMe"            "https://whotextedme.hive.baby"
          check_url "HiveAdminSupport"       "https://support.hive.baby"
          check_url "HiveMeme"               "https://hivememe.hive.baby"
          check_url "HiveAestheticBestie"    "https://hiveaestheticbestie.hive.baby"
          check_url "HiveMicroRitual"        "https://hivemicroritual.hive.baby"
          check_url "SovereignArbitrage"     "https://sovereignarbitrage.hive.baby"
          check_url "QueenBee"               "https://queenbee.hive.baby"
          # ── UD Ecosystem ───────────────────────────────────────────────────────────────
          check_url "UDUtilities"            "https://utilities.hive.baby"
          check_url "UDConverter"            "https://converter.hive.baby"
          check_url "UDReader"               "https://reader.hive.baby"
          check_url "UDSigner"               "https://signer.hive.baby"
          check_url "UniversalDocumentInc"   "https://universaldocument.hive.baby"
          check_url "ud.hive.baby"           "https://ud.hive.baby"
          # ── Short URL aliases ─────────────────────────────────────────────────────────────────
          check_url "moon.hive.baby"         "https://moon.hive.baby"
          check_url "clock.hive.baby"        "https://clock.hive.baby"
          check_url "bodylog.hive.baby"      "https://bodylog.hive.baby"
          check_url "secret.hive.baby"       "https://secret.hive.baby"
          check_url "aesthetic.hive.baby"    "https://aesthetic.hive.baby"

      - name: Check API endpoints
        run: |
          check_api() {
            local NAME="$1"
            local URL="$2"
            local METHOD="$3"
            local PAYLOAD="$4"
            local EXPECT_OK="$5"
            local RESP BODY

            if [ "$METHOD" = "POST" ]; then
              RESP=$(curl -s -o /tmp/api_body.txt -w "%{http_code}" \
                -X POST "$URL" \
                -H "Content-Type: application/json" \
                -d "$PAYLOAD" \
                --max-time 20 2>/dev/null)
            else
              RESP=$(curl -s -o /tmp/api_body.txt -w "%{http_code}" \
                "$URL" --max-time 20 2>/dev/null)
            fi

            BODY=$(head -c 200 /tmp/api_body.txt | tr -d '\000' | head -c 120)

            if echo "$RESP" | grep -qE '^(5[0-9]{2}|000)$'; then
              echo "::warning::FAIL $NAME → $RESP (crash)"
              printf "### %s\n- URL: %s\n- Status: HTTP %s (crash — expected non-5xx)\n- Body: \`%s\`\n\n" \
                "$NAME" "$URL" "$RESP" "$BODY" >> /tmp/failures.txt
            else
              if echo ",$EXPECT_OK," | grep -q ",$RESP,"; then
                echo "::notice::OK   $NAME → $RESP (expected)"
              else
                echo "::notice::WARN $NAME → $RESP (unexpected but not crash)"
              fi
            fi
          }

          # honeypot filled → should reject 400, not crash
          check_api "test.hive.baby/api/apply (honeypot)" \
            "https://test.hive.baby/api/apply" \
            "POST" \
            '{"name":"healthcheck","email":"hc@example.com","engineSlug":"hivephoto","country":"GB","device":"desktop","browser":"chrome","agreedFeedback":true,"honeypot":"bot"}' \
            "400"

          # bogus verify token → should return 4xx, not crash
          check_api "ud.hive.baby/api/verify?id=test" \
            "https://ud.hive.baby/api/verify?id=healthcheck-test-$(date +%s)" \
            "GET" "" \
            "400,404,405"

      - name: Ensure label exists
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            "https://api.github.com/repos/${{ github.repository }}/labels" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"name":"health-check-failure","color":"d73a4a","description":"Automated health check detected a failing Hive property"}' \
            -o /dev/null || true

      - name: Create issue on failure
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -s /tmp/failures.txt ]; then
            echo "✓ All Hive properties healthy"
            exit 0
          fi

          FAILURE_DETAILS=$(cat /tmp/failures.txt)
          FAILURE_COUNT=$(grep -c '^###' /tmp/failures.txt || echo "?")

          TITLE="Health Check Failure — ${FAILURE_COUNT} propert$([ "$FAILURE_COUNT" = "1" ] && echo "y" || echo "ies") down ($(date -u '+%Y-%m-%d %H:%M UTC'))"

          BODY=$(cat <<BODYEOF
          ## $FAILURE_COUNT Hive propert$([ "$FAILURE_COUNT" = "1" ] && echo "y" || echo "ies") failing health check

          **Run:** [${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          **Trigger:** ${{ github.event_name }}
          **Time:** $(date -u '+%Y-%m-%d %H:%M UTC')

          ---

          $FAILURE_DETAILS

          ---
          *Auto-generated by [health-check.yml](https://github.com/${{ github.repository }}/blob/main/.github/workflows/health-check.yml). Close this issue once resolved.*
          BODYEOF
          )

          curl -s -X POST \
            "https://api.github.com/repos/${{ github.repository }}/issues" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg title "$TITLE" \
              --arg body "$BODY" \
              '{title: $title, body: $body, labels: ["health-check-failure"]}')" \
            | jq -r '"::notice::Issue created: " + (.html_url // "failed")'
