name: Vercel Ecosystem Monitor

on:
  schedule:
    - cron: '0 * * * *' # Run hourly
  workflow_dispatch: # Allow manual trigger

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Vercel Status Check
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          node -e "
          const https = require('https');
          const VERCEL_TOKEN = process.env.VERCEL_TOKEN;

          if (!VERCEL_TOKEN) {
            console.error('Missing VERCEL_TOKEN secret');
            process.exit(1);
          }

          https.get('https://api.vercel.com/v9/projects', { headers: { Authorization: 'Bearer ' + VERCEL_TOKEN } }, r => {
            let d = '';
            r.on('data', c => d += c);
            r.on('end', () => {
              const projs = JSON.parse(d).projects;
              let hasErrors = false;
              let checked = 0;
              
              if (!projs || projs.length === 0) {
                console.log('No projects found.');
                process.exit(0);
              }

              for (const p of projs) {
                https.get('https://api.vercel.com/v6/deployments?app=' + p.name + '&limit=1', { headers: { Authorization: 'Bearer ' + VERCEL_TOKEN } }, r2 => {
                  let d2 = '';
                  r2.on('data', c => d2 += c);
                  r2.on('end', () => {
                    checked++;
                    try {
                      const deps = JSON.parse(d2).deployments;
                      if (deps[0]) {
                        console.log(p.name + ': ' + deps[0].state);
                        if (deps[0].state === 'ERROR') {
                          hasErrors = true;
                          console.error('🚨 ' + p.name + ' IS IN ERROR STATE!');
                        }
                      }
                    } catch(e) {}
                    
                    if (checked === projs.length) {
                      if (hasErrors) {
                        console.error('\\nEcosystem audit failed: Some engines are broken.');
                        process.exit(1);
                      } else {
                        console.log('\\nEcosystem audit passed: All engines are healthy.');
                        process.exit(0);
                      }
                    }
                  });
                });
              }
            });
          });
          "
