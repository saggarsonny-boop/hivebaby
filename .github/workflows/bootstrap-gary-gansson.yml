name: Bootstrap — gary-gansson repo + deploy

on:
  workflow_dispatch:
    inputs:
      admin_password:
        description: 'ADMIN_PASSWORD value for gary-gansson Vercel env'
        required: true
        type: string

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout hivebaby
        uses: actions/checkout@v4
        with:
          ref: claude/add-gary-gansson-briefing-mAuJf

      - name: Resolve tokens
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          VERCEL_TOKEN_MAIN: ${{ secrets.VERCEL_TOKEN_MAIN }}
          VERCEL_TOKEN_FALLBACK: ${{ secrets.VERCEL_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CF_TOKEN: ${{ secrets.CF_TOKEN }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          echo "GH_PAT_LEN=${#GH_PAT}" >> $GITHUB_ENV
          VERCEL_TOKEN="${VERCEL_TOKEN_MAIN:-$VERCEL_TOKEN_FALLBACK}"
          echo "VERCEL_TOKEN=$VERCEL_TOKEN" >> $GITHUB_ENV
          CF_RESOLVED="${CF_TOKEN:-$CF_API_TOKEN}"
          echo "CF_RESOLVED=$CF_RESOLVED" >> $GITHUB_ENV

      # ── Step 1: Create repo ──────────────────────────────────────────────
      - name: Create gary-gansson repo
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST https://api.github.com/user/repos \
            -H "Authorization: Bearer $GH_PAT" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            --data '{"name":"gary-gansson","description":"Gary Gansson — HiveTV AI talk show host. gary.hive.baby","private":false,"auto_init":false}')
          echo "HTTP=$HTTP"
          if [ "$HTTP" = "422" ]; then
            echo "Repo already exists — continuing."
          elif [ "$HTTP" != "201" ]; then
            echo "Failed to create repo: $HTTP"
            exit 1
          fi

      # ── Step 2: Push code ────────────────────────────────────────────────
      - name: Push gary-gansson source to new repo
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"

          cd gary-gansson
          git init
          git add -A
          git commit -m "feat: Gary Gansson Phase 1 — landing page, submission form, admin, DB schema"
          git branch -M main
          git remote add origin https://$GH_PAT@github.com/saggarsonny-boop/gary-gansson.git
          git push -u origin main --force

      # ── Step 3: Create Vercel project ────────────────────────────────────
      - name: Create Vercel project gary-gansson
        env:
          VERCEL_TOKEN: ${{ env.VERCEL_TOKEN }}
        run: |
          RESP=$(curl -s -X POST "https://api.vercel.com/v9/projects" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{
              "name": "gary-gansson",
              "framework": "nextjs",
              "gitRepository": {
                "type": "github",
                "repo": "saggarsonny-boop/gary-gansson"
              }
            }')
          echo "$RESP" | head -c 500
          PROJECT_ID=$(echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id',''))" 2>/dev/null || echo "")
          echo "VERCEL_PROJECT_ID=$PROJECT_ID" >> $GITHUB_ENV

      # ── Step 4: Set Vercel env vars ──────────────────────────────────────
      - name: Set Vercel env vars
        env:
          VERCEL_TOKEN: ${{ env.VERCEL_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ADMIN_PASSWORD: ${{ inputs.admin_password }}
        run: |
          PROJECT="gary-gansson"

          set_env() {
            KEY="$1"
            VALUE="$2"
            curl -s -X POST "https://api.vercel.com/v10/projects/$PROJECT/env" \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              -H "Content-Type: application/json" \
              --data "{\"key\":\"$KEY\",\"value\":\"$(echo $VALUE | sed 's/"/\\"/g')\",\"type\":\"encrypted\",\"target\":[\"production\",\"preview\"]}"
            echo "  set $KEY"
          }

          set_env "DATABASE_URL" "$DATABASE_URL"
          set_env "ADMIN_PASSWORD" "$ADMIN_PASSWORD"
          set_env "NEXT_PUBLIC_SITE_URL" "https://gary.hive.baby"

      # ── Step 5: Add custom domain ────────────────────────────────────────
      - name: Add custom domain to Vercel
        env:
          VERCEL_TOKEN: ${{ env.VERCEL_TOKEN }}
        run: |
          curl -s -X POST "https://api.vercel.com/v10/projects/gary-gansson/domains" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"name":"gary.hive.baby"}'
          echo "Domain gary.hive.baby added."

      # ── Step 6: Cloudflare DNS CNAME ────────────────────────────────────
      - name: Add Cloudflare CNAME gary.hive.baby
        env:
          CF_RESOLVED: ${{ env.CF_RESOLVED }}
        run: |
          RESP=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/bcb5522993ecf90a4f1d5dfe101e5a5c/dns_records" \
            -H "Authorization: Bearer $CF_RESOLVED" \
            -H "Content-Type: application/json" \
            --data '{"type":"CNAME","name":"gary","content":"cname.vercel-dns.com","ttl":1,"proxied":false}')
          SUCCESS=$(echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('success',False))")
          echo "Cloudflare response: $RESP"
          if [ "$SUCCESS" != "True" ]; then
            echo "Warning: CNAME may already exist or failed. Check Cloudflare."
          fi

      # ── Step 7: Disable Vercel deployment protection ─────────────────────
      - name: Disable deployment protection (public access)
        env:
          VERCEL_TOKEN: ${{ env.VERCEL_TOKEN }}
        run: |
          curl -s -X PATCH "https://api.vercel.com/v9/projects/gary-gansson" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"ssoProtection":null}'
          echo "Deployment protection disabled."

      - name: Summary
        run: |
          echo "==============================="
          echo "Gary Gansson Phase 1 Bootstrap"
          echo "==============================="
          echo "Repo:   https://github.com/saggarsonny-boop/gary-gansson"
          echo "Live:   https://gary.hive.baby (DNS propagation ~2 min)"
          echo "Admin:  https://gary.hive.baby/admin"
          echo "Health: https://gary.hive.baby/api/health"
          echo ""
          echo "Next: Phase 2 — Scriptwriter engine (Claude Haiku)"
          echo "==============================="
