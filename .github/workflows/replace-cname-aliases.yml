name: Cloudflare - Replace CNAME aliases

on:
  workflow_dispatch:

jobs:
  replace-cnames:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Delete existing and recreate CNAME aliases
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE: ${{ secrets.CF_ZONE }}
        run: |
          ZONE="${CF_ZONE:-bcb5522993ecf90a4f1d5dfe101e5a5c}"
          if [ -z "$CF_API_TOKEN" ]; then echo "ERROR: CF_API_TOKEN not set"; exit 1; fi
          echo "Zone: $ZONE"

          echo ""
          echo "=== STEP 1: List matching records ==="
          ALL=$(curl -s \
            "https://api.cloudflare.com/client/v4/zones/${ZONE}/dns_records?per_page=100" \
            -H "Authorization: Bearer ${CF_API_TOKEN}")

          echo "$ALL" | jq -r '.result[] | select(.name | test("moon\\.|bodylog\\.|clock\\.|secret\\.|aesthetic\\.")) | [.id, .type, .name, .content] | @tsv'

          echo ""
          echo "=== STEP 2: Delete existing records ==="
          for NAME in moon.hive.baby bodylog.hive.baby clock.hive.baby secret.hive.baby aesthetic.hive.baby; do
            IDS=$(echo "$ALL" | jq -r --arg n "$NAME" '.result[] | select(.name == $n) | .id')
            if [ -z "$IDS" ]; then
              echo "  $NAME: no existing record"
              continue
            fi
            for ID in $IDS; do
              echo "  Deleting $NAME (id=$ID)"
              RESULT=$(curl -s -X DELETE \
                "https://api.cloudflare.com/client/v4/zones/${ZONE}/dns_records/${ID}" \
                -H "Authorization: Bearer ${CF_API_TOKEN}" | jq -c '{success,errors}')
              echo "    $RESULT"
            done
          done

          echo ""
          echo "=== STEP 3: Create correct records ==="
          create_cname() {
            local NAME=$1 TARGET=$2
            echo "  Creating $NAME -> $TARGET"
            STATUS=$(curl -s -o /tmp/cf.json -w "%{http_code}" \
              -X POST "https://api.cloudflare.com/client/v4/zones/${ZONE}/dns_records" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"type\":\"CNAME\",\"name\":\"${NAME}\",\"content\":\"${TARGET}\",\"ttl\":1,\"proxied\":false}")
            RESULT=$(jq -c '{success,id:.result.id,name:.result.name,content:.result.content,errors}' /tmp/cf.json 2>/dev/null || cat /tmp/cf.json)
            echo "    HTTP $STATUS: $RESULT"
            if [ "$STATUS" != "200" ] && [ "$STATUS" != "201" ]; then exit 1; fi
          }

          create_cname moon.hive.baby      hivemoon.hive.baby
          create_cname bodylog.hive.baby   hivebodylog.hive.baby
          create_cname clock.hive.baby     hiveclock.hive.baby
          create_cname secret.hive.baby    secretbox.hive.baby
          create_cname aesthetic.hive.baby hiveaestheticbestie.hive.baby

          echo ""
          echo "=== DONE ==="
