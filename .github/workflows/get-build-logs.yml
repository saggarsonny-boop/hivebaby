name: Get HivePhoto Build Logs

on:
  workflow_dispatch:

jobs:
  logs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch build logs
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          node << 'EOF' > /tmp/build-logs.txt
          const TOKEN = process.env.VERCEL_TOKEN;
          // Get latest deployment ID dynamically
          const latest = await fetch('https://api.vercel.com/v6/deployments?projectId=hive-hivephoto&limit=1', {
            headers: { 'Authorization': `Bearer ${TOKEN}` },
          }).then(r => r.json());
          const dep0 = (latest.deployments || [])[0];
          if (!dep0) { console.log('No deployments found'); process.exit(1); }
          const DEP_ID = dep0.uid;
          console.log(`Latest deployment: ${DEP_ID} state=${dep0.state}`);

          async function main() {
            // Get deployment details
            const dep = await fetch(`https://api.vercel.com/v13/deployments/${DEP_ID}`, {
              headers: { 'Authorization': `Bearer ${TOKEN}` },
            }).then(r => r.json());
            console.log(`State: ${dep.status || dep.state}`);
            console.log(`Error: ${dep.errorMessage || dep.error?.message || 'none'}`);
            console.log(`Created: ${new Date(dep.createdAt || dep.created).toISOString()}`);

            // Get build output/events
            const events = await fetch(`https://api.vercel.com/v2/deployments/${DEP_ID}/events?limit=500`, {
              headers: { 'Authorization': `Bearer ${TOKEN}` },
            }).then(r => r.text());

            console.log('\n=== BUILD LOG ===');
            const lines = events.split('\n');
            for (const line of lines) {
              try {
                const e = JSON.parse(line);
                const text = e.payload?.text || e.payload || '';
                if (text) console.log(text);
              } catch {
                if (line.trim()) console.log(line);
              }
            }
          }

          main().catch(e => { console.error('FATAL:', e.message); process.exit(1); });
          EOF

          cat /tmp/build-logs.txt
          cp /tmp/build-logs.txt hivephoto-build-logs.txt

      - name: Commit logs
        run: |
          git config user.email "claude@hive.baby"
          git config user.name "Claude Code"
          git add hivephoto-build-logs.txt
          git commit -m "chore: hivephoto build logs $(date -u +%H:%M)" || echo "no changes"
          git push
