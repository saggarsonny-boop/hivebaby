name: HiveOps — daily warn-mode sweep + cross-repo audit

# Daily auto-flip of expired warn-mode overrides to enforce, plus a
# cross-repo audit pass that exercises external Hive engine repos
# (UD Converter, HiveEngineBuilder, HiveAdminSupport, …) so verdict
# regressions are detected daily — not weeks after the fact when
# someone runs an audit by hand.
#
# What it does:
#   1. Scans every apps/<engine>/ENGINE_GRAMMAR.md for ## Hive-Ops
#      Overrides entries with mode: warn AND warn_until in the past.
#   2. Strips those entries from the manifest (the rule reverts to
#      default enforce — exactly the behavior the runner's
#      applyOverride() in runner.ts already triggers when warn_until
#      lapses; the sweep just makes the file reflect that state).
#   3. Runs cross-repo audit (tools/hive-ops/crossRepoAudit.ts) over
#      every engine listed in tools/hive-ops/external-engines.json,
#      cloning each repo fresh, running the SAME runHiveOps() the in-
#      tree sweep uses, and aggregating verdicts into the daily report.
#      tier-2 hive_alerts inserted on FAIL.
#   4. Writes one hive_alerts row per flip + one per imminent expiry +
#      one summary row + one per cross-repo FAIL.
#   5. Commits any manifest mutations directly to main (the sweep IS
#      the authoritative actor; a PR per day would be noise) and opens
#      or updates today's "HiveOps Daily Sweep Report YYYY-MM-DD"
#      issue with the full audit trail (in-tree + cross-repo sections).
#
# Permissions:
#   contents: write       — to commit ENGINE_GRAMMAR.md mutations
#   issues:   write       — to open / update the daily status issue
#   pull-requests: write  — reserved; not used today (commits go direct)
#
# Secrets / tokens:
#   DATABASE_URL                — Postgres connection string for hive_alerts
#                                 (already in repo secrets per ci-doctor +
#                                 the query-hive-alerts.yml workflow)
#   HIVEOPS_CROSS_REPO_TOKEN    — optional fine-grained PAT, scoped to read
#                                 (Contents + Metadata + Pull-requests) every
#                                 repo in saggarsonny-boop. When present, the
#                                 cross-repo audit can clone PRIVATE engine
#                                 repos (hive-engine-builder, etc.) instead
#                                 of surfacing them as ERROR rows. Rotates
#                                 yearly per CLAUDE.md §E [PAT_ROTATION_HIVEOPS].
#                                 If absent, audit gracefully degrades —
#                                 public repos still audit correctly.
#   GITHUB_TOKEN                — default token; used by crossRepoAudit.ts
#                                 when HIVEOPS_CROSS_REPO_TOKEN is unset.
#                                 Reads public org repos only.

on:
  schedule:
    # 09:00 UTC daily.
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without mutating manifests or writing alerts"
        required: false
        default: 'false'

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: hive-ops-daily-sweep
  cancel-in-progress: false

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          # Need write access to commit; use the default GITHUB_TOKEN.
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install hive-ops deps
        working-directory: tools/hive-ops
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund

      - name: Install hive-finalize deps (cross-repo audit needs V-rules)
        working-directory: tools/hive-finalize
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund

      - name: Install psql (for hive_alerts inserts)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client

      - name: Run sweep
        id: sweep
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          set -uo pipefail
          FLAGS=""
          if [ "${DRY_RUN:-false}" = "true" ]; then
            FLAGS="--dry-run"
            echo "Manual dispatch: dry-run mode (no manifest mutations, no alert inserts)"
          fi
          npx --prefix tools/hive-ops tsx tools/hive-ops/dailySweep.ts $FLAGS \
            | tee /tmp/sweep-output.txt
          echo "today=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Append summary to GitHub step summary
        if: always()
        run: |
          {
            echo "## HiveOps daily sweep — $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo ""
            echo '```'
            cat /tmp/sweep-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run cross-repo audit (external engines)
        id: cross
        env:
          # HIVEOPS_CROSS_REPO_TOKEN: fine-grained PAT scoped to the
          # saggarsonny-boop org with Contents + Metadata + Pull-requests
          # read on all repos. When set, the audit can clone PRIVATE
          # engine repos (hive-engine-builder is currently the only one).
          # When unset, the audit falls back to GITHUB_TOKEN (public repos
          # only) and surfaces private repos as ERROR rows. The fallback
          # in tools/hive-ops/crossRepoAudit.ts:cloneRepo() does the
          # actual selection.
          HIVEOPS_CROSS_REPO_TOKEN: ${{ secrets.HIVEOPS_CROSS_REPO_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          set -uo pipefail
          FLAGS=""
          if [ "${DRY_RUN:-false}" = "true" ]; then FLAGS="--dry-run"; fi
          # crossRepoAudit.ts always exits 0 (verdicts in the report,
          # not the exit code) unless tooling itself errors. Failing
          # external engines surface via tier-2 hive_alerts + the
          # external-engines section of the daily issue.
          npx --prefix tools/hive-ops tsx tools/hive-ops/crossRepoAudit.ts \
            --out /tmp/hive-ops-cross-repo.md $FLAGS \
            | tee /tmp/cross-repo-output.txt
          echo "ran=true" >> "$GITHUB_OUTPUT"

      - name: Append cross-repo summary to step summary + issue body
        if: always() && steps.cross.outputs.ran == 'true'
        run: |
          {
            echo ""
            echo "## Cross-repo audit"
            echo ""
            echo '```'
            cat /tmp/cross-repo-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          # Concatenate the cross-repo Markdown section onto the daily
          # issue body produced by dailySweep.ts. The downstream "Open
          # or update daily report issue" step picks up the merged file.
          if [ -f /tmp/hive-ops-sweep-issue.md ] && [ -f /tmp/hive-ops-cross-repo.md ]; then
            cat /tmp/hive-ops-cross-repo.md >> /tmp/hive-ops-sweep-issue.md
          elif [ -f /tmp/hive-ops-cross-repo.md ]; then
            # No in-tree changes today, so dailySweep didn't write the
            # issue body. Synthesize a minimal header so the cross-repo
            # section still publishes.
            {
              printf '# HiveOps Daily Sweep — %s\n\n' "$(date -u +%Y-%m-%d)"
              printf '_No in-tree warn-mode flips today; cross-repo audit ran._\n'
              cat /tmp/hive-ops-cross-repo.md
            } > /tmp/hive-ops-sweep-issue.md
          fi

      - name: Commit manifest mutations (if any)
        id: commit
        if: github.event.inputs.dry_run != 'true'
        run: |
          set -euo pipefail
          if git diff --quiet -- 'apps/*/ENGINE_GRAMMAR.md'; then
            echo "No manifest changes — nothing to commit."
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add apps/*/ENGINE_GRAMMAR.md
          TODAY=$(date -u +%Y-%m-%d)
          MSG_FILE=$(mktemp)
          {
            printf 'ops(hive-ops): daily sweep — strip expired warn-mode overrides (%s)\n\n' "$TODAY"
            printf 'The HiveOps daily sweep removed override entries whose warn_until\n'
            printf 'date had passed. Affected rules now revert to default enforce: the\n'
            printf 'next PR audit will report them as fail until either the underlying\n'
            printf 'issue is fixed or a fresh override is added with documented reason.\n\n'
            printf 'See the daily sweep issue for the full list and tracking links.\n\n'
            printf 'Generated by .github/workflows/hive-ops-daily-sweep.yml\n'
          } > "$MSG_FILE"
          git commit -F "$MSG_FILE"
          git push origin HEAD:main
          echo "committed=true" >> "$GITHUB_OUTPUT"

      - name: Open or update daily report issue
        # hashFiles() only resolves paths inside the workspace, so we
        # gate on dry-run at the YAML layer and check the actual /tmp
        # body file inside the shell — see PR #107 for context.
        if: github.event.inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TODAY: ${{ steps.sweep.outputs.today }}
        run: |
          set -euo pipefail
          if [ ! -f /tmp/hive-ops-sweep-issue.md ]; then
            echo "Sweep wrote no issue body (likely a tooling-error short-circuit). Skipping."
            exit 0
          fi
          TITLE="HiveOps Daily Sweep Report ${TODAY}"
          # gh issue list will return a JSON array; reuse today's issue
          # if it already exists (e.g. someone manually re-ran the
          # workflow), otherwise open a fresh one.
          EXISTING=$(gh issue list --state open --search "in:title \"${TITLE}\"" --json number,title --jq ".[] | select(.title==\"${TITLE}\") | .number" | head -n 1)
          if [ -n "${EXISTING:-}" ]; then
            echo "Updating existing issue #${EXISTING}"
            gh issue edit "${EXISTING}" --body-file /tmp/hive-ops-sweep-issue.md
          else
            echo "Opening new issue: ${TITLE}"
            gh issue create \
              --title "${TITLE}" \
              --body-file /tmp/hive-ops-sweep-issue.md \
              --label "hive-ops" \
              --label "daily-sweep" \
              || gh issue create \
                --title "${TITLE}" \
                --body-file /tmp/hive-ops-sweep-issue.md
          fi
