name: HiveOps — daily warn-mode sweep

# Daily auto-flip of expired warn-mode overrides to enforce.
#
# What it does:
#   1. Scans every apps/<engine>/ENGINE_GRAMMAR.md for ## Hive-Ops
#      Overrides entries with mode: warn AND warn_until in the past.
#   2. Strips those entries from the manifest (the rule reverts to
#      default enforce — exactly the behavior the runner's
#      applyOverride() in runner.ts already triggers when warn_until
#      lapses; the sweep just makes the file reflect that state).
#   3. Writes one row per flip + one per imminent expiry + one summary
#      to the hive_alerts table.
#   4. Commits any manifest mutations directly to main (the sweep IS
#      the authoritative actor; a PR per day would be noise) and opens
#      or updates today's "HiveOps Daily Sweep Report YYYY-MM-DD"
#      issue with the full audit trail.
#
# Permissions:
#   contents: write       — to commit ENGINE_GRAMMAR.md mutations
#   issues:   write       — to open / update the daily status issue
#   pull-requests: write  — reserved; not used today (commits go direct)
#
# Secrets:
#   DATABASE_URL          — Postgres connection string for hive_alerts
#                           (already in repo secrets per ci-doctor + the
#                           query-hive-alerts.yml workflow)

on:
  schedule:
    # 09:00 UTC daily.
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without mutating manifests or writing alerts"
        required: false
        default: 'false'

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: hive-ops-daily-sweep
  cancel-in-progress: false

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          # Need write access to commit; use the default GITHUB_TOKEN.
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install hive-ops deps
        working-directory: tools/hive-ops
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund

      - name: Install psql (for hive_alerts inserts)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client

      - name: Run sweep
        id: sweep
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          set -uo pipefail
          FLAGS=""
          if [ "${DRY_RUN:-false}" = "true" ]; then
            FLAGS="--dry-run"
            echo "Manual dispatch: dry-run mode (no manifest mutations, no alert inserts)"
          fi
          npx --prefix tools/hive-ops tsx tools/hive-ops/dailySweep.ts $FLAGS \
            | tee /tmp/sweep-output.txt
          echo "today=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Append summary to GitHub step summary
        if: always()
        run: |
          {
            echo "## HiveOps daily sweep — $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo ""
            echo '```'
            cat /tmp/sweep-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Commit manifest mutations (if any)
        id: commit
        if: github.event.inputs.dry_run != 'true'
        run: |
          set -euo pipefail
          if git diff --quiet -- 'apps/*/ENGINE_GRAMMAR.md'; then
            echo "No manifest changes — nothing to commit."
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add apps/*/ENGINE_GRAMMAR.md
          git commit -m "ops(hive-ops): daily sweep — strip expired warn-mode overrides ($(date -u +%Y-%m-%d))

The HiveOps daily sweep removed override entries whose warn_until
date had passed. Affected rules now revert to default enforce: the
next PR audit will report them as fail until either the underlying
issue is fixed or a fresh override is added with documented reason.

See the daily sweep issue for the full list and tracking links.

Generated by .github/workflows/hive-ops-daily-sweep.yml"
          git push origin HEAD:main
          echo "committed=true" >> "$GITHUB_OUTPUT"

      - name: Open or update daily report issue
        if: github.event.inputs.dry_run != 'true' && hashFiles('/tmp/hive-ops-sweep-issue.md') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TODAY: ${{ steps.sweep.outputs.today }}
        run: |
          set -euo pipefail
          TITLE="HiveOps Daily Sweep Report ${TODAY}"
          # gh issue list will return a JSON array; reuse today's issue
          # if it already exists (e.g. someone manually re-ran the
          # workflow), otherwise open a fresh one.
          EXISTING=$(gh issue list --state open --search "in:title \"${TITLE}\"" --json number,title --jq ".[] | select(.title==\"${TITLE}\") | .number" | head -n 1)
          if [ -n "${EXISTING:-}" ]; then
            echo "Updating existing issue #${EXISTING}"
            gh issue edit "${EXISTING}" --body-file /tmp/hive-ops-sweep-issue.md
          else
            echo "Opening new issue: ${TITLE}"
            gh issue create \
              --title "${TITLE}" \
              --body-file /tmp/hive-ops-sweep-issue.md \
              --label "hive-ops" \
              --label "daily-sweep" \
              || gh issue create \
                --title "${TITLE}" \
                --body-file /tmp/hive-ops-sweep-issue.md
          fi
