name: Ops — Query hive_alerts (one-off)

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'How many recent rows to return'
        required: false
        default: '5'

permissions:
  contents: read

jobs:
  query:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Read recent hive_alerts rows
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          LIMIT:        ${{ inputs.limit }}
        run: |
          set -uo pipefail
          [ -n "${DATABASE_URL:-}" ] || { echo "::error::DATABASE_URL not set"; exit 1; }
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client

          echo "===== Row count ====="
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 \
            -c "SELECT count(*) AS total FROM hive_alerts;"

          # Validate LIMIT is an integer to avoid SQL injection via inline substitution.
          LIM="${LIMIT:-5}"
          case "$LIM" in
            ''|*[!0-9]*) echo "::error::LIMIT must be a non-negative integer"; exit 1;;
          esac

          echo "===== Recent rows ($LIM) ====="
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -P "expanded=on" \
            -c "SELECT id, tier, agent, subject, action_required, action_url, sent, created_at FROM hive_alerts ORDER BY created_at DESC LIMIT $LIM;"

          echo "===== Body of newest row ====="
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -P "expanded=on" \
            -c "SELECT body FROM hive_alerts ORDER BY created_at DESC LIMIT 1;"
