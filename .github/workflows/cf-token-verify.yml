name: Cloudflare — Verify token (read-only)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Read-only Cloudflare token introspection
        env:
          CF_TOKEN: ${{ secrets.CF_TOKEN }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE: ${{ secrets.CF_ZONE }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          set -uo pipefail

          TOKEN="${CF_TOKEN:-${CF_API_TOKEN:-$CLOUDFLARE_API_TOKEN}}"
          if [ -z "$TOKEN" ]; then
            echo "ERROR: No Cloudflare token found in CF_TOKEN / CF_API_TOKEN / CLOUDFLARE_API_TOKEN."
            exit 1
          fi
          ZONE="${CF_ZONE:-${CLOUDFLARE_ZONE_ID:-bcb5522993ecf90a4f1d5dfe101e5a5c}}"
          echo "::notice::Resolved token (length=${#TOKEN}); zone configured (hidden)"
          # Mask the configured zone so it doesn't print in logs
          echo "::add-mask::$ZONE"

          AUTH=(-H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json")

          echo
          echo "===== 1. /user/tokens/verify ====="
          curl -s "${AUTH[@]}" "https://api.cloudflare.com/client/v4/user/tokens/verify" | jq .

          echo
          echo "===== 2. GET /zones (zones the token can list) ====="
          # If the token has Zone:Read, we'll see zones it can access.
          # 9999 / 9109 = unauthenticated; success=false means restricted.
          ZONES_RESP=$(curl -s "${AUTH[@]}" "https://api.cloudflare.com/client/v4/zones?per_page=50")
          echo "$ZONES_RESP" | jq '{success, errors, count: (.result_info.total_count // 0), zones: [.result[]? | {id, name, status, account: .account.name}]}'

          echo
          echo "===== 3. GET /zones/<configured-zone> (direct zone access) ====="
          # 403 here means token is not scoped to this zone; 200 confirms scope.
          ZONE_RESP=$(curl -s "${AUTH[@]}" "https://api.cloudflare.com/client/v4/zones/$ZONE")
          # Print success/errors and zone name only — never the configured ID
          echo "$ZONE_RESP" | jq '{success, errors, name: .result.name, status: .result.status, type: .result.type, plan: .result.plan.name, account: .result.account.name}'

          echo
          echo "===== 4. GET /zones/<configured-zone>/dns_records?type=CNAME (DNS:Read sanity) ====="
          # 200 + a result array proves DNS:Read works.
          # 403 here proves it does not.
          DNS_RESP=$(curl -s "${AUTH[@]}" "https://api.cloudflare.com/client/v4/zones/$ZONE/dns_records?type=CNAME&per_page=3")
          echo "$DNS_RESP" | jq '{success, errors, sample_count: ((.result // []) | length), first_record_name: ((.result // [])[0].name // null)}'

          echo
          echo "===== 5. GET /user/tokens (list tokens — needs User:API Tokens:Read; usually denied) ====="
          # If granted, this returns the full token policy list (scopes + resources).
          # Most API tokens are not granted this scope; expect 403/9109. Read-only either way.
          curl -s "${AUTH[@]}" "https://api.cloudflare.com/client/v4/user/tokens?per_page=10" \
            | jq '{success, errors, count: ((.result // []) | length), tokens: [.result[]? | {id, name, status, policies: [.policies[]? | {effect, permission_groups: [.permission_groups[].name], resources}]}]}'
